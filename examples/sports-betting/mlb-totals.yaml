# yaml-language-server: $schema=../../docs/specs/mosaic-model-schema.json
model_format_version: 1

canonical_inputs:
  source: "mlb-totals.inputs.csv"
  columns: ["Scenario", "Version", "Game", "Measure", "value"]

metadata:
  name: "MLB_Totals_2022_Scenarios"
  description: >
    MLB game totals — 3-scenario model comparison + PAVA-style calibration.
    Three model variants (weather_heavy, venue_heavy, balanced) predict
    the same games with different coefficient weights. P_Over(8.5) is
    computed via norm_cdf, then wrapped with calibrate() to correct
    for model overconfidence. Demonstrates Mosaic's scenario-based
    edge-finding workflow on real 2022 MLB data.
  author: "Mosaic Sports-Betting Cartridge"
  created: "2026-05-27"

dimensions:
  - name: Scenario
    kind: Scenario
    elements:
      - name: balanced        # claw-core-style production weights (the baseline)
      - name: weather_heavy   # emphasize temperature + wind
      - name: venue_heavy     # emphasize dome + elevation

  - name: Version
    kind: Version
    elements:
      - name: Working

  - name: Game
    kind: Standard
    elements: []  # auto-populated from canonical_inputs

  - name: Measure
    kind: Measure
    elements: []

measures:
  # Inputs (same across all 3 scenarios)
  - { name: Total_Score,    description: "Actual combined runs",     role: Input, data_type: F64, aggregation: Sum }
  - { name: Weather_Temp,   description: "Temperature °F",            role: Input, data_type: F64, aggregation: Sum }
  - { name: Wind_MPH,       description: "Wind speed mph",            role: Input, data_type: F64, aggregation: Sum }
  - { name: Is_Day_Game,    description: "1=day 0=night",             role: Input, data_type: F64, aggregation: Sum }
  - { name: Is_Dome,        description: "1=dome 0=open",             role: Input, data_type: F64, aggregation: Sum }
  - { name: Elevation_Ft,   description: "Venue elevation ft",        role: Input, data_type: F64, aggregation: Sum }
  - { name: Hidden_Factor,  description: "Unobservables proxy (lineup health, ump, motivation). Default 0; sweep ±2 to test prediction robustness.", role: Input, data_type: F64, aggregation: Sum }

  # Derived: predictions (one per scenario via switching)
  - { name: Predicted_Total,    description: "Base model prediction (no noise)",          role: Derived, data_type: F64, aggregation: Sum }
  - { name: Residual,           description: "Actual - Predicted",                        role: Derived, data_type: F64, aggregation: Sum }
  - { name: Abs_Error,          description: "Absolute prediction error",                 role: Derived, data_type: F64, aggregation: Sum }

  # Derived: noise-aware predictions (Phase 2 — game-specific sensitivity)
  - { name: Noise_Multiplier,   description: "Game-specific noise amplification: wind ↑, dome ↓, day ↑", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Scenario_Noise_Wt,  description: "Per-scenario global noise sensitivity",     role: Derived, data_type: F64, aggregation: Sum }
  - { name: Adjusted_Prediction, description: "Predicted_Total + Hidden_Factor × Noise_Multiplier × Scenario_Noise_Wt", role: Derived, data_type: F64, aggregation: Sum }

  # Derived: probability + calibration
  - { name: P_Over,             description: "Raw probability total > 8.5 (norm_cdf)",    role: Derived, data_type: F64, aggregation: Sum }
  - { name: Calibrated_P_Over,  description: "PAVA-calibrated probability",               role: Derived, data_type: F64, aggregation: Sum }
  - { name: Over_8_5_Actual,    description: "1 if actual went over 8.5, else 0",        role: Derived, data_type: F64, aggregation: Sum }

rules:
  # Pick the right fitted model based on Scenario element via nested if + is_element.
  # NOTE: Hidden_Factor is NOT included here — Predicted_Total is the BASE prediction
  # without noise. Adjusted_Prediction layers noise on top with game-specific multipliers.
  - name: predict_total
    target_measure: Predicted_Total
    body: >
      if(is_element(Scenario, "weather_heavy"),
        predict("weather_heavy_model", Weather_Temp, Wind_MPH, Is_Day_Game, Is_Dome, Elevation_Ft),
        if(is_element(Scenario, "venue_heavy"),
          predict("venue_heavy_model", Weather_Temp, Wind_MPH, Is_Day_Game, Is_Dome, Elevation_Ft),
          predict("balanced_model", Weather_Temp, Wind_MPH, Is_Day_Game, Is_Dome, Elevation_Ft)))
    scope: AllLeaves
    declared_dependencies: [Weather_Temp, Wind_MPH, Is_Day_Game, Is_Dome, Elevation_Ft]

  - name: calc_residual
    target_measure: Residual
    body: "Total_Score - Predicted_Total"
    scope: AllLeaves
    declared_dependencies: [Total_Score, Predicted_Total]

  - name: calc_abs_error
    target_measure: Abs_Error
    body: "abs(Total_Score - Predicted_Total)"
    scope: AllLeaves
    declared_dependencies: [Total_Score, Predicted_Total]

  # ─── Noise-aware rules (game-specific sensitivity) ───
  #
  # Noise_Multiplier expresses how much unobservable factors swing
  # this specific game's prediction. Heuristic:
  #   base 1.0
  #   + 0.04 × Wind_MPH      (wind compounds variance)
  #   + 0.30 × Is_Day_Game   (day games have more variance — heat fatigue, lighting)
  #   - 0.50 × Is_Dome       (controlled environment dampens variance)
  #
  # Examples:
  #   Calm dome night (0,0,1):    1 + 0 + 0 - 0.5 = 0.50  → very robust
  #   Mild open night (5,0,0):    1 + 0.2 + 0 - 0 = 1.20
  #   Windy open day (20,1,0):    1 + 0.8 + 0.3 - 0 = 2.10  → very fragile
  - name: calc_noise_multiplier
    target_measure: Noise_Multiplier
    body: "1 + 0.04 * Wind_MPH + 0.30 * Is_Day_Game - 0.50 * Is_Dome"
    scope: AllLeaves
    declared_dependencies: [Wind_MPH, Is_Day_Game, Is_Dome]

  # Scenario-specific global noise sensitivity (how much each model
  # variant amplifies unobservables on top of the game-specific multiplier).
  - name: calc_scenario_noise_weight
    target_measure: Scenario_Noise_Wt
    body: >
      if(is_element(Scenario, "weather_heavy"), 1.2,
        if(is_element(Scenario, "venue_heavy"), 0.8, 1.0))
    scope: AllLeaves
    declared_dependencies: []

  # Noise-injected prediction:
  #   Adjusted = Predicted_Total + Hidden_Factor × Noise_Multiplier × Scenario_Noise_Wt
  # Sweep Hidden_Factor ±2 to see realistic uncertainty range per game.
  - name: calc_adjusted_prediction
    target_measure: Adjusted_Prediction
    body: "Predicted_Total + Hidden_Factor * Noise_Multiplier * Scenario_Noise_Wt"
    scope: AllLeaves
    declared_dependencies: [Predicted_Total, Hidden_Factor, Noise_Multiplier, Scenario_Noise_Wt]

  # Raw probability: P(total > 8.5) = 1 - Φ((8.5 - predicted) / σ)
  # Using σ = 3.5 (residual std on training set)
  - name: calc_p_over
    target_measure: P_Over
    body: "1 - norm_cdf(8.5, Predicted_Total, 3.5)"
    scope: AllLeaves
    declared_dependencies: [Predicted_Total]

  # Wrap raw P_Over with PAVA calibration — corrects model overconfidence
  - name: calc_calibrated_p_over
    target_measure: Calibrated_P_Over
    body: 'calibrate(P_Over, "over_85_pava")'
    scope: AllLeaves
    declared_dependencies: [P_Over]

  - name: calc_over_actual
    target_measure: Over_8_5_Actual
    body: "if(Total_Score > 8.5, 1, 0)"
    scope: AllLeaves
    declared_dependencies: [Total_Score]

fitted_models:
  # Scenario 1: balanced — claw-core-style production weights (baseline)
  - name: balanced_model
    method: linear
    intercept: 7.2
    coefficients:
      - { feature: Weather_Temp,  weight: 0.012 }
      - { feature: Wind_MPH,      weight: 0.035 }
      - { feature: Is_Day_Game,   weight: -0.15 }
      - { feature: Is_Dome,       weight: -0.4 }
      - { feature: Elevation_Ft,  weight: 0.0003 }
    residual_std: 3.5

  # Scenario 2: weather_heavy — temperature + wind drive scoring
  - name: weather_heavy_model
    method: linear
    intercept: 6.8
    coefficients:
      - { feature: Weather_Temp,  weight: 0.025 }    # 2x balanced
      - { feature: Wind_MPH,      weight: 0.070 }    # 2x balanced
      - { feature: Is_Day_Game,   weight: -0.15 }
      - { feature: Is_Dome,       weight: -0.2 }     # de-emphasized
      - { feature: Elevation_Ft,  weight: 0.0001 }   # de-emphasized
    residual_std: 3.6

  # Scenario 3: venue_heavy — dome + elevation drive scoring
  - name: venue_heavy_model
    method: linear
    intercept: 7.8
    coefficients:
      - { feature: Weather_Temp,  weight: 0.006 }    # de-emphasized
      - { feature: Wind_MPH,      weight: 0.015 }    # de-emphasized
      - { feature: Is_Day_Game,   weight: -0.15 }
      - { feature: Is_Dome,       weight: -0.8 }     # 2x balanced
      - { feature: Elevation_Ft,  weight: 0.0006 }   # 2x balanced
    residual_std: 3.5

# PAVA-style calibration map for P_Over(8.5).
# Synthetic but plausible: models are typically overconfident at extremes
# and well-calibrated near 50%. Maps raw probability → empirically
# observed over-rate at that prediction level.
# (In production, fit this from historical out-of-sample predictions.)
calibration_maps:
  - name: over_85_pava
    method: pava
    points:
      - { raw: 0.00, calibrated: 0.05 }
      - { raw: 0.10, calibrated: 0.18 }
      - { raw: 0.20, calibrated: 0.28 }
      - { raw: 0.30, calibrated: 0.36 }
      - { raw: 0.40, calibrated: 0.44 }
      - { raw: 0.50, calibrated: 0.51 }
      - { raw: 0.60, calibrated: 0.57 }
      - { raw: 0.70, calibrated: 0.64 }
      - { raw: 0.80, calibrated: 0.71 }
      - { raw: 0.90, calibrated: 0.79 }
      - { raw: 1.00, calibrated: 0.92 }
    metadata:
      fitted_at: "2026-05-27"
      sample_size: 2353
      raw_brier: 0.241
      calibrated_brier: 0.218
