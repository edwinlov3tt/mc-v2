# yaml-language-server: $schema=../../docs/specs/mosaic-model-schema.json
# Generated by training/mlb/export_to_mosaic.py — DO NOT EDIT BY HAND.
# Regenerate after retraining: python3 training/mlb/export_to_mosaic.py
#
# Mosaic 3L (ADR-0031) shipped native nbinom_sf(k, mu, alpha) in the
# formula evaluator. P_Over_NB is now Derived from a rule rather than
# pre-computed in Python. Dispersion lives in the parameters: block.
model_format_version: 1

parameters:
  - name: dispersion_alpha
    value: 0.1245
    description: "NB2 dispersion α fit by method-of-moments on training residuals (EXP-025). Var(Y|μ) = μ + α·μ²."

canonical_inputs:
  source: "mlb-totals.inputs.csv"
  columns: ["Scenario", "Version", "Game", "Measure", "value"]

metadata:
  name: "MLB_Totals_V10_NB"
  description: >
    MLB game-totals prediction cartridge — V1.0 Lasso (α=0.01, 13/13 non-zero
    features) trained on 2022-2024 (7273 games), held out on 2025
    (2425 games). Holdout MAE 3.542, raw direction accuracy
    0.490 (Gaussian baseline, under the 0.56 ADR-0002 gate).

    PRODUCTION P(over) uses Negative Binomial NB2(α_NB = 0.1245), not Gaussian.
    Per EXP-025/026 (2026-05-27), the NB switch lifts direction accuracy from
    0.5037 → 0.5582 (+5.78pp, CI [0.538, 0.578]) without retraining. With an
    |edge| ≥ 10pp filter the bet pool of n=376/2424 reaches 0.5904 direction
    accuracy and +12.71% ROI at −110. V1.0 is shippable as filter-only.

    The Gaussian P(over) rule is retained as P_Over_Gauss for diagnostic
    comparison; production P_Over_NB is computed natively via
    nbinom_sf(sharp_close_line, Predicted_Total, param(dispersion_alpha))
    per Mosaic ADR-0031 (Phase 3L, 2026-05-27).

    Noise-injection layer (Noise_Multiplier × Hidden_Factor) preserved from
    the Mosaic PM research note (docs/research-notes/noise-injection-as-bet-filter.md).
    Sweep Hidden_Factor ±2 via mc model whatif to surface per-game prediction
    sensitivity.
  author: "training/mlb/export_to_mosaic.py"
  created: "2026-05-30"

dimensions:
  - name: Scenario
    kind: Scenario
    actuals_element: Base
    elements:
      - name: Base
        scenario_meta: Default

  - name: Version
    kind: Version
    elements:
      - name: Working
        version_state: Draft

  - name: Game
    kind: Standard
    elements: []  # auto-populated from canonical_inputs (CLI + daemon both, since mc-v2 7c2788b)

  - name: Measure
    kind: Measure
    elements: []

measures:
  - { name: home_starter_xera, description: "Home starting pitcher xERA (season)", role: Input, data_type: F64, aggregation: Sum }
  - { name: away_starter_xera, description: "Away starting pitcher xERA (season)", role: Input, data_type: F64, aggregation: Sum }
  - { name: home_team_runs_l30, description: "Home team rolling runs scored, 30 days", role: Input, data_type: F64, aggregation: Sum }
  - { name: away_team_runs_l30, description: "Away team rolling runs scored, 30 days", role: Input, data_type: F64, aggregation: Sum }
  - { name: home_team_runs_allowed_l30, description: "Home team rolling runs allowed, 30 days", role: Input, data_type: F64, aggregation: Sum }
  - { name: away_team_runs_allowed_l30, description: "Away team rolling runs allowed, 30 days", role: Input, data_type: F64, aggregation: Sum }
  - { name: park_factor, description: "Venue park factor (runs vs league avg)", role: Input, data_type: F64, aggregation: Sum }
  - { name: weather_temp_f, description: "Game-time temperature, °F", role: Input, data_type: F64, aggregation: Sum }
  - { name: weather_wind_mph, description: "Game-time wind speed, mph", role: Input, data_type: F64, aggregation: Sum }
  - { name: is_dome_or_closed, description: "1 if dome / closed roof, else 0", role: Input, data_type: F64, aggregation: Sum }
  - { name: venue_elevation_ft, description: "Venue elevation, feet", role: Input, data_type: F64, aggregation: Sum }
  - { name: is_day_game, description: "1 if day game, else 0", role: Input, data_type: F64, aggregation: Sum }
  - { name: game_number, description: "1 = single / first of DH; 2 = second of DH", role: Input, data_type: F64, aggregation: Sum }
  - { name: Hidden_Factor, description: "Unobservables proxy (lineup health, ump, motivation). Default 0; sweep ±2 to test prediction robustness per the noise-injection research note.", role: Input, data_type: F64, aggregation: Sum }
  - { name: total_score, description: "Actual combined runs (training label)", role: Input, data_type: F64, aggregation: Sum }
  - { name: season, description: "Season year (2022-2025). Holdout slice key for mc model grade, e.g. --holdout 'season >= 2025'.", role: Input, data_type: F64, aggregation: Sum }
  - { name: sharp_close_line, description: "Vig-removed sharp closing total (LowVig+BetOnlineAg consensus per EXP-023)", role: Input, data_type: F64, aggregation: Sum }
  - { name: market_p_over, description: "Market-implied P(over) from sharp consensus, vig-removed multiplicatively", role: Input, data_type: F64, aggregation: Sum }

  # ── Derived: predictions ────────────────────────────────────────────────
  - { name: Predicted_Total,    description: "V1.0 Lasso prediction (runs)", role: Derived, data_type: F64, aggregation: Sum }
  - { name: P_Over_NB,          description: "P(total > sharp_close_line) via native Mosaic nbinom_sf (ADR-0031). dispersion_alpha=0.1245 from training residuals (EXP-025).", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Residual,           description: "total_score - Predicted_Total", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Abs_Error,          description: "|residual|",                    role: Derived, data_type: F64, aggregation: Sum }

  # ── Derived: noise-aware predictions (PM research note) ────────────────
  - { name: Noise_Multiplier,   description: "1 + 0.04·wind + 0.30·day - 0.50·dome — game-specific noise amplification", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Adjusted_Prediction, description: "Predicted_Total + Hidden_Factor × Noise_Multiplier", role: Derived, data_type: F64, aggregation: Sum }

  # ── Derived: probability + grading ─────────────────────────────────────
  - { name: P_Over_Gauss,       description: "Diagnostic-only: P(total > line) via norm_cdf (Gaussian). EXP-025 showed this is structurally biased on MLB totals — production reads P_Over_NB instead.", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Edge_NB,            description: "|P_Over_NB - market_p_over| × sign(P_Over_NB - market_p_over). >0 = bet over; <0 = bet under.", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Abs_Edge_NB,        description: "Magnitude |edge|. Production filter ≥ 0.10.", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Over_Actual,        description: "1 if total_score > sharp_close_line, else 0", role: Derived, data_type: F64, aggregation: Sum }
  - { name: bet_side,           description: "1.0 = model bets OVER, 0.0 = UNDER. Discrete group key for mc model grade (--bucket bet_side 0:0.5:1.0).", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Direction_Correct,  description: "1 if NB-side bet won, 0 otherwise", role: Derived, data_type: F64, aggregation: Sum }
  - { name: Should_Bet,         description: "1 if Abs_Edge_NB ≥ 0.10 (production filter from EXP-026)", role: Derived, data_type: F64, aggregation: Sum }

rules:
  - name: predict_total
    target_measure: Predicted_Total
    body: predict("mlb_v10_lasso", home_starter_xera, away_starter_xera, home_team_runs_l30, away_team_runs_l30, home_team_runs_allowed_l30, away_team_runs_allowed_l30, park_factor, weather_temp_f, weather_wind_mph, is_dome_or_closed, venue_elevation_ft, is_day_game, game_number)
    scope: AllLeaves
    declared_dependencies: [home_starter_xera, away_starter_xera, home_team_runs_l30, away_team_runs_l30, home_team_runs_allowed_l30, away_team_runs_allowed_l30, park_factor, weather_temp_f, weather_wind_mph, is_dome_or_closed, venue_elevation_ft, is_day_game, game_number]

  - name: calc_residual
    target_measure: Residual
    body: "total_score - Predicted_Total"
    scope: AllLeaves
    declared_dependencies: [total_score, Predicted_Total]

  - name: calc_abs_error
    target_measure: Abs_Error
    body: "abs(total_score - Predicted_Total)"
    scope: AllLeaves
    declared_dependencies: [total_score, Predicted_Total]

  # Noise multiplier — heuristic from PM research note, not fit.
  #   base 1.0
  #   + 0.04 × wind_mph      (wind compounds variance)
  #   + 0.30 × is_day_game   (day games more variance)
  #   - 0.50 × is_dome       (controlled env dampens variance)
  - name: calc_noise_multiplier
    target_measure: Noise_Multiplier
    body: "1 + 0.04 * weather_wind_mph + 0.30 * is_day_game - 0.50 * is_dome_or_closed"
    scope: AllLeaves
    declared_dependencies: [weather_wind_mph, is_day_game, is_dome_or_closed]

  - name: calc_adjusted_prediction
    target_measure: Adjusted_Prediction
    body: "Predicted_Total + Hidden_Factor * Noise_Multiplier"
    scope: AllLeaves
    declared_dependencies: [Predicted_Total, Hidden_Factor, Noise_Multiplier]

  # σ = training residual std (4.318); kept for diagnostic
  # comparison only. Production reads P_Over_NB (native nbinom_sf).
  - name: calc_p_over_gauss
    target_measure: P_Over_Gauss
    body: "1 - norm_cdf(sharp_close_line, Predicted_Total, 4.318)"
    scope: AllLeaves
    declared_dependencies: [sharp_close_line, Predicted_Total]

  # Native Negative Binomial P(over) via Mosaic 3L nbinom_sf primitive.
  # Half-integer floor semantics: line=8.5 → P(X > 8) = P(X ≥ 9).
  - name: compute_p_over_nb
    target_measure: P_Over_NB
    body: "nbinom_sf(sharp_close_line, Predicted_Total, param(dispersion_alpha))"
    scope: AllLeaves
    declared_dependencies: [sharp_close_line, Predicted_Total]

  - name: calc_edge_nb
    target_measure: Edge_NB
    body: "P_Over_NB - market_p_over"
    scope: AllLeaves
    declared_dependencies: [P_Over_NB, market_p_over]

  - name: calc_abs_edge_nb
    target_measure: Abs_Edge_NB
    body: "abs(P_Over_NB - market_p_over)"
    scope: AllLeaves
    declared_dependencies: [P_Over_NB, market_p_over]

  - name: calc_over_actual
    target_measure: Over_Actual
    body: "if(total_score > sharp_close_line, 1, 0)"
    scope: AllLeaves
    declared_dependencies: [total_score, sharp_close_line]

  - name: calc_bet_side
    target_measure: bet_side
    body: "if(P_Over_NB > market_p_over, 1.0, 0.0)"
    scope: AllLeaves
    declared_dependencies: [P_Over_NB, market_p_over]

  # NB-side direction: bet OVER if P_Over_NB > market_p_over, else UNDER.
  - name: calc_direction_correct
    target_measure: Direction_Correct
    body: "if(P_Over_NB > market_p_over, Over_Actual, 1 - Over_Actual)"
    scope: AllLeaves
    declared_dependencies: [P_Over_NB, market_p_over, Over_Actual]

  - name: calc_should_bet
    target_measure: Should_Bet
    body: "if(Abs_Edge_NB >= 0.10, 1, 0)"
    scope: AllLeaves
    declared_dependencies: [Abs_Edge_NB]

