model_format_version: 1
metadata:
  name: "NBA_Totals_Prediction"
  description: "NBA game-totals prediction model — demonstrates predict(), calibrate(), exp(), and norm_cdf()."
  author: "Mosaic Phase 3H"

dimensions:
  - name: "Scenario"
    kind: "Scenario"
    description: "Scenario dimension"
    actuals_element: "Base"
    elements:
      - name: "Base"
        scenario_meta: "Default"

  - name: "Version"
    kind: "Version"
    description: "Version dimension"
    elements:
      - name: "Working"
        version_state: "Draft"

  - name: "Time"
    kind: "Time"
    description: "Game dates"
    granularity: "day"
    time_anchor: "Game_1"
    elements:
      - name: "Game_1"
        period_start: "2026-04-15"
        period_end_exclusive: "2026-04-16"
      - name: "Game_2"
        period_start: "2026-04-16"
        period_end_exclusive: "2026-04-17"

  - name: "Matchup"
    kind: "Standard"
    description: "Individual NBA matchups"
    elements:
      - name: "LAL_at_BOS"
      - name: "GSW_at_MIL"

  - name: "Measure"
    kind: "Measure"
    description: "Measure dimension"
    elements: []

measures:
  - name: "avg_pace"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Average pace (possessions per 48 min)"

  - name: "combined_off_rating"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Combined offensive rating of both teams"

  - name: "avg_recent_total_10"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Average total points in last 10 games for both teams"

  - name: "combined_def_rating"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Combined defensive rating of both teams"

  - name: "home_missing_top_scorers"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Number of home team top scorers missing (0-3)"

  - name: "Market_Line"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Sportsbook over/under line for the game"

  - name: "Predicted_Total"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Model-predicted total points (from fitted Lasso model)"

  - name: "Over_Probability"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Probability the actual total exceeds the market line"

  - name: "Exp_Test"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Test: exp(0) should be 1.0"

  - name: "NormCdf_Test"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Test: norm_cdf(0, 0, 1) should be ~0.5"

rules:
  - name: "predict_total"
    target_measure: "Predicted_Total"
    scope: "AllLeaves"
    description: "Lasso model prediction of game total points"
    body: "predict(\"nba_total_v1_lasso\", avg_pace, combined_off_rating, avg_recent_total_10, combined_def_rating, home_missing_top_scorers)"
    declared_dependencies:
      - "avg_pace"
      - "combined_off_rating"
      - "avg_recent_total_10"
      - "combined_def_rating"
      - "home_missing_top_scorers"

  - name: "over_prob"
    target_measure: "Over_Probability"
    scope: "AllLeaves"
    description: "P(total > market line) using normal CDF with model residual_std"
    body: "1 - norm_cdf(Market_Line, Predicted_Total, 17.251)"
    declared_dependencies:
      - "Market_Line"
      - "Predicted_Total"

  - name: "exp_test_rule"
    target_measure: "Exp_Test"
    scope: "AllLeaves"
    description: "Test rule: exp(0) = 1"
    body: "exp(0)"
    declared_dependencies: []

  - name: "normcdf_test_rule"
    target_measure: "NormCdf_Test"
    scope: "AllLeaves"
    description: "Test rule: norm_cdf(0, 0, 1) ≈ 0.5"
    body: "norm_cdf(0, 0, 1)"
    declared_dependencies: []

fitted_models:
  - name: "nba_total_v1_lasso"
    method: "linear"
    intercept: 211.34
    coefficients:
      - { feature: "avg_pace", weight: 3.016 }
      - { feature: "combined_off_rating", weight: 0.548 }
      - { feature: "avg_recent_total_10", weight: 0.331 }
      - { feature: "combined_def_rating", weight: 0.602 }
      - { feature: "home_missing_top_scorers", weight: -1.203 }
    standardization:
      method: "zscore"
      params:
        - { feature: "avg_pace", mean: 99.2, std: 4.7 }
        - { feature: "combined_off_rating", mean: 113.4, std: 8.2 }
        - { feature: "combined_def_rating", mean: 110.1, std: 7.8 }
        - { feature: "avg_recent_total_10", mean: 222.5, std: 15.3 }
        - { feature: "home_missing_top_scorers", mean: 0.12, std: 0.33 }
    residual_std: 17.251
    metadata:
      fitted_at: "2026-04-08T12:00:00Z"
      algorithm: "lasso"
      alpha: 0.7
      n_train: 3685
      holdout_mae: 13.783

calibration_maps:
  - name: "nba_totals_calibration_v1"
    method: "pava"
    points:
      - { raw: 0.50, calibrated: 0.42 }
      - { raw: 0.55, calibrated: 0.46 }
      - { raw: 0.60, calibrated: 0.50 }
      - { raw: 0.65, calibrated: 0.55 }
      - { raw: 0.70, calibrated: 0.61 }
      - { raw: 0.75, calibrated: 0.68 }
      - { raw: 0.80, calibrated: 0.76 }
    metadata:
      fitted_at: "2026-04-30T01:29:14Z"
      sample_size: 1312
      raw_brier: 0.2887
      calibrated_brier: 0.2499

golden_tests:
  # exp(0) = 1.0 — evaluated directly in eval_expr, no cross-coord
  - name: "exp_zero_is_one"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "Game_1"
      Matchup: "LAL_at_BOS"
      Measure: "Exp_Test"
    expect: 1.0

  - name: "normcdf_standard_at_zero"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "Game_1"
      Matchup: "LAL_at_BOS"
      Measure: "NormCdf_Test"
    expect_within_epsilon:
      value: 0.5
      epsilon: 0.0001

canonical_inputs:
  columns: ["Scenario", "Version", "Time", "Matchup", "Measure", "value"]
  inline:
    rows:
      # LAL_at_BOS Game_1: features at their standardization means
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "avg_pace", 99.2]
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "combined_off_rating", 113.4]
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "avg_recent_total_10", 222.5]
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "combined_def_rating", 110.1]
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "home_missing_top_scorers", 0.12]
      - ["Base", "Working", "Game_1", "LAL_at_BOS", "Market_Line", 220.5]
      # GSW_at_MIL Game_1
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "avg_pace", 99.2]
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "combined_off_rating", 113.4]
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "avg_recent_total_10", 222.5]
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "combined_def_rating", 110.1]
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "home_missing_top_scorers", 0.12]
      - ["Base", "Working", "Game_1", "GSW_at_MIL", "Market_Line", 215.0]
      # Game_2 data
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "avg_pace", 99.2]
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "combined_off_rating", 113.4]
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "avg_recent_total_10", 222.5]
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "combined_def_rating", 110.1]
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "home_missing_top_scorers", 0.12]
      - ["Base", "Working", "Game_2", "LAL_at_BOS", "Market_Line", 220.5]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "avg_pace", 99.2]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "combined_off_rating", 113.4]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "avg_recent_total_10", 222.5]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "combined_def_rating", 110.1]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "home_missing_top_scorers", 0.12]
      - ["Base", "Working", "Game_2", "GSW_at_MIL", "Market_Line", 215.0]
