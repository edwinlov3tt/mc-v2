model_format_version: 1
metadata:
  name: "NBA_Totals_V16_Lasso"
  description: >
    NBA game-totals prediction cartridge — V1.6 Lasso (alpha=0.7) with player
    availability features. Production weights from claw-core Worker inference.
    Includes 3 layers: Calculator (predict + price), Judge (grade + calibrate),
    Investigator (diagnose + flag). Uses REAL production coefficients and
    PAVA-fitted calibration from 1,312 OOD settled bets (EXP-016).
  author: "Mosaic Sports-Betting Cartridge"
  created: "2026-05-05"

# =============================================================================
# DIMENSIONS (6 required — all natural to the domain)
# =============================================================================

dimensions:
  - name: "Scenario"
    kind: "Scenario"
    description: "Scenario dimension (Base only for production use)"
    actuals_element: "Base"
    elements:
      - name: "Base"
        scenario_meta: "Default"

  - name: "Version"
    kind: "Version"
    description: "Version dimension"
    elements:
      - name: "Working"
        version_state: "Draft"

  - name: "Time"
    kind: "Time"
    description: "Game dates (one period per game date)"
    granularity: "day"
    time_anchor: "2026_04_15"
    elements:
      - name: "2026_04_15"
        period_start: "2026-04-15"
        period_end_exclusive: "2026-04-16"
      - name: "2026_04_16"
        period_start: "2026-04-16"
        period_end_exclusive: "2026-04-17"
      - name: "2026_04_17"
        period_start: "2026-04-17"
        period_end_exclusive: "2026-04-18"
      - name: "2026_04_18"
        period_start: "2026-04-18"
        period_end_exclusive: "2026-04-19"
      - name: "2026_04_19"
        period_start: "2026-04-19"
        period_end_exclusive: "2026-04-20"

  - name: "Sportsbook"
    kind: "Standard"
    description: "Per-book lines enable line-shopping and edge optimization"
    elements:
      - name: "Pinnacle"
      - name: "DraftKings"
      - name: "FanDuel"

  - name: "Game"
    kind: "Standard"
    description: "Individual NBA matchups (Away_at_Home format)"
    elements:
      - name: "LAL_at_BOS"
      - name: "GSW_at_MIL"
      - name: "CLE_at_ORL"
      - name: "PHX_at_DEN"
      - name: "OKC_at_SAC"
      - name: "PHI_at_IND"
      - name: "NYK_at_MIA"
      - name: "DAL_at_MIN"
      - name: "MEM_at_NOP"
      - name: "ATL_at_CHI"
      - name: "LAC_at_POR"
      - name: "SAS_at_HOU"
      - name: "TOR_at_DET"
      - name: "BKN_at_WAS"
      - name: "UTA_at_CHA"

  - name: "Measure"
    kind: "Measure"
    description: "All input features, derived predictions, grading, and diagnostics"
    elements: []

# =============================================================================
# MEASURES — Layer 0 (Inputs)
# =============================================================================

measures:
  # --- Model Features (Inputs) ---
  - name: "avg_pace"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Average pace (possessions/48 min) of both teams"

  - name: "pace_delta"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Pace differential (home_pace - away_pace)"

  - name: "combined_off_rating"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Sum of home + away offensive ratings (pts per 100 poss)"

  - name: "combined_def_rating"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Sum of home + away defensive ratings (pts per 100 poss)"

  - name: "avg_recent_total_5"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Average total points in last 5 games for both teams"

  - name: "avg_recent_total_10"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Average total points in last 10 games for both teams"

  - name: "home_recent_total_avg"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Home team recent total average (home-specific)"

  - name: "combined_stl"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Combined steals (both teams)"

  - name: "home_missing_top_scorers"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Number of home team top-3 scorers missing (0-3)"

  - name: "away_missing_top_scorers"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Number of away team top-3 scorers missing (0-3)"

  # --- Market Data (Inputs — vary per Sportsbook) ---
  - name: "Market_Line"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Sportsbook over/under line for the game"

  - name: "Decimal_Odds"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Decimal odds offered (e.g., 1.91 for standard -110)"

  - name: "Book_Tier"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Book tier encoded: 1=sharp, 2=mid, 3=soft"

  # --- Actuals (for grading) ---
  - name: "Actual_Total"
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
    description: "Actual combined final score (for post-game grading)"

  # ==========================================================================
  # LAYER 1 — Calculator (predict + price)
  # ==========================================================================

  - name: "Predicted_Total"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "V1.6 Lasso model-predicted total points"

  - name: "P_Over"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Raw probability total exceeds Market_Line (normal CDF)"

  - name: "Calibrated_P"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Calibrated probability after PAVA isotonic adjustment"

  - name: "EV_Per_Dollar"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Expected value per dollar staked on the OVER"

  - name: "Kelly_Fraction"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Quarter-Kelly stake fraction (0 if negative EV)"

  # ==========================================================================
  # LAYER 2 — Judge (grade + calibrate)
  # ==========================================================================

  - name: "Prediction_Error"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Signed prediction error (positive = over-predicted)"

  - name: "Abs_Error"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Absolute prediction error |predicted - actual|"

  - name: "Direction_Correct"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "1 if model predicted correct side vs market line, 0 otherwise"

  - name: "Brier_Component"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Per-game Brier score component (Calibrated_P - outcome)^2"

  - name: "Confidence_Bucket"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Calibrated confidence bucket (1-5 scale)"

  - name: "Profit_Units"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Profit in units if bet was placed (0 if no bet)"

  # ==========================================================================
  # LAYER 3 — Investigator (diagnose + flag)
  # ==========================================================================

  - name: "Overconfidence_Flag"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "1 if model was confident (>0.60) but wrong"

  - name: "High_Pace_Miss"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "1 if game had high pace (>102) and large error (>15)"

  - name: "Should_Bet"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "1 if EV > 3% and Calibrated_P > 0.56 (recommended bet)"

  - name: "Error_Severity"
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
    description: "Error severity bucket (1=good, 2=moderate, 3=bad, 4=severe)"

# =============================================================================
# RULES
# =============================================================================

rules:
  # --- Layer 1: Calculator ---

  - name: "predict_total"
    target_measure: "Predicted_Total"
    scope: "AllLeaves"
    description: "V1.6 Lasso prediction using 10 production coefficients (1 is zero-weight)"
    body: "predict(\"nba_v16_lasso\", avg_pace, pace_delta, combined_off_rating, combined_def_rating, avg_recent_total_5, avg_recent_total_10, home_recent_total_avg, combined_stl, home_missing_top_scorers, away_missing_top_scorers)"
    declared_dependencies:
      - "avg_pace"
      - "pace_delta"
      - "combined_off_rating"
      - "combined_def_rating"
      - "avg_recent_total_5"
      - "avg_recent_total_10"
      - "home_recent_total_avg"
      - "combined_stl"
      - "home_missing_top_scorers"
      - "away_missing_top_scorers"

  - name: "calc_p_over"
    target_measure: "P_Over"
    scope: "AllLeaves"
    description: "P(total > line) = 1 - Phi((line - predicted) / sigma)"
    body: "1 - norm_cdf(Market_Line, Predicted_Total, 17.251)"
    declared_dependencies:
      - "Market_Line"
      - "Predicted_Total"

  - name: "calc_calibrated_p"
    target_measure: "Calibrated_P"
    scope: "AllLeaves"
    description: "Apply PAVA calibration map to raw probability"
    body: "calibrate(P_Over, \"v16_calibration\")"
    declared_dependencies:
      - "P_Over"

  - name: "calc_ev"
    target_measure: "EV_Per_Dollar"
    scope: "AllLeaves"
    description: "EV = P_win * (decimal - 1) - (1 - P_win)"
    body: "Calibrated_P * (Decimal_Odds - 1) - (1 - Calibrated_P)"
    declared_dependencies:
      - "Calibrated_P"
      - "Decimal_Odds"

  - name: "calc_kelly"
    target_measure: "Kelly_Fraction"
    scope: "AllLeaves"
    description: "Quarter-Kelly: f* = (b*p - q) / b * 0.25, floored at 0"
    body: "if(EV_Per_Dollar > 0, safe_div(Calibrated_P * Decimal_Odds - 1, Decimal_Odds - 1, 0) * 0.25, 0)"
    declared_dependencies:
      - "EV_Per_Dollar"
      - "Calibrated_P"
      - "Decimal_Odds"

  # --- Layer 2: Judge ---

  - name: "calc_prediction_error"
    target_measure: "Prediction_Error"
    scope: "AllLeaves"
    description: "Signed error — positive means model over-predicted"
    body: "Predicted_Total - Actual_Total"
    declared_dependencies:
      - "Predicted_Total"
      - "Actual_Total"

  - name: "calc_abs_error"
    target_measure: "Abs_Error"
    scope: "AllLeaves"
    description: "Absolute prediction error"
    body: "abs(Predicted_Total - Actual_Total)"
    declared_dependencies:
      - "Predicted_Total"
      - "Actual_Total"

  - name: "calc_direction_correct"
    target_measure: "Direction_Correct"
    scope: "AllLeaves"
    description: "1 if model and reality agree on over/under relative to market line"
    body: "if((P_Over > 0.5) * (Actual_Total > Market_Line) + (P_Over <= 0.5) * (Actual_Total <= Market_Line) > 0, 1, 0)"
    declared_dependencies:
      - "P_Over"
      - "Actual_Total"
      - "Market_Line"

  - name: "calc_brier"
    target_measure: "Brier_Component"
    scope: "AllLeaves"
    description: "Brier score component for this game"
    body: "(Calibrated_P - Direction_Correct) * (Calibrated_P - Direction_Correct)"
    declared_dependencies:
      - "Calibrated_P"
      - "Direction_Correct"

  - name: "calc_confidence_bucket"
    target_measure: "Confidence_Bucket"
    scope: "AllLeaves"
    description: "Confidence bucket: 1=[0.50-0.54], 2=[0.54-0.58], 3=[0.58-0.62], 4=[0.62-0.66], 5=[0.66+]"
    body: "if(Calibrated_P < 0.54, 1, if(Calibrated_P < 0.58, 2, if(Calibrated_P < 0.62, 3, if(Calibrated_P < 0.66, 4, 5))))"
    declared_dependencies:
      - "Calibrated_P"

  - name: "calc_profit_units"
    target_measure: "Profit_Units"
    scope: "AllLeaves"
    description: "Profit if Kelly says bet: win gets (decimal-1), loss gets -1"
    body: "if(Kelly_Fraction > 0, if(Direction_Correct > 0.5, Decimal_Odds - 1, -1), 0)"
    declared_dependencies:
      - "Kelly_Fraction"
      - "Direction_Correct"
      - "Decimal_Odds"

  # --- Layer 3: Investigator ---

  - name: "calc_overconfidence_flag"
    target_measure: "Overconfidence_Flag"
    scope: "AllLeaves"
    description: "Flag games where model was highly confident but wrong"
    body: "if(Calibrated_P > 0.60, if(Direction_Correct < 0.5, 1, 0), 0)"
    declared_dependencies:
      - "Calibrated_P"
      - "Direction_Correct"

  - name: "calc_high_pace_miss"
    target_measure: "High_Pace_Miss"
    scope: "AllLeaves"
    description: "Flag: high-pace game with large prediction miss"
    body: "if(avg_pace > 102, if(Abs_Error > 15, 1, 0), 0)"
    declared_dependencies:
      - "avg_pace"
      - "Abs_Error"

  - name: "calc_should_bet"
    target_measure: "Should_Bet"
    scope: "AllLeaves"
    description: "Recommended bet signal: meaningful EV and sufficient confidence"
    body: "if(EV_Per_Dollar > 0.03, if(Calibrated_P > 0.56, 1, 0), 0)"
    declared_dependencies:
      - "EV_Per_Dollar"
      - "Calibrated_P"

  - name: "calc_error_severity"
    target_measure: "Error_Severity"
    scope: "AllLeaves"
    description: "Error severity: 1=good(<8), 2=moderate(8-15), 3=bad(15-25), 4=severe(>25)"
    body: "if(Abs_Error < 8, 1, if(Abs_Error < 15, 2, if(Abs_Error < 25, 3, 4)))"
    declared_dependencies:
      - "Abs_Error"

# =============================================================================
# FITTED MODELS — Real V1.6 Lasso production coefficients from claw-core
# =============================================================================

fitted_models:
  - name: "nba_v16_lasso"
    method: "linear"
    intercept: -435.176757
    coefficients:
      - { feature: "avg_pace", weight: 3.015916 }
      - { feature: "pace_delta", weight: 0.0 }
      - { feature: "combined_off_rating", weight: 0.548263 }
      - { feature: "combined_def_rating", weight: 0.602389 }
      - { feature: "avg_recent_total_5", weight: 0.064143 }
      - { feature: "avg_recent_total_10", weight: 0.331426 }
      - { feature: "home_recent_total_avg", weight: 0.046528 }
      - { feature: "combined_stl", weight: -0.017643 }
      - { feature: "home_missing_top_scorers", weight: -1.202871 }
      - { feature: "away_missing_top_scorers", weight: -0.054086 }
    standardization: null
    residual_std: 17.251
    metadata:
      fitted_at: "2026-04-11T00:00:00Z"
      algorithm: "lasso"
      alpha: 0.7
      n_train: 3685
      holdout_mae: 13.783

# =============================================================================
# CALIBRATION MAPS — PAVA from EXP-016 (1,312 OOD settled bets)
# =============================================================================

calibration_maps:
  - name: "v16_calibration"
    method: "pava"
    points:
      - { raw: 0.510, calibrated: 0.487 }
      - { raw: 0.535, calibrated: 0.518 }
      - { raw: 0.560, calibrated: 0.542 }
      - { raw: 0.590, calibrated: 0.571 }
      - { raw: 0.625, calibrated: 0.609 }
      - { raw: 0.670, calibrated: 0.652 }
      - { raw: 0.730, calibrated: 0.714 }
      - { raw: 0.820, calibrated: 0.791 }
    metadata:
      fitted_at: "2026-04-30T01:29:14Z"
      sample_size: 1312
      raw_brier: 0.2491
      calibrated_brier: 0.2453

# =============================================================================
# LOOKUP TABLES
# =============================================================================

lookup_tables: []

# =============================================================================
# STATUS THRESHOLDS — Confidence bins + error severity
# =============================================================================

status_thresholds:
  - name: "confidence_bins"
    bands:
      - { label: "Low", max: 0.54 }
      - { label: "Moderate", max: 0.58 }
      - { label: "Good", max: 0.62 }
      - { label: "Strong", max: 0.66 }
      - { label: "Very Strong" }

  - name: "error_severity"
    bands:
      - { label: "Good", max: 8.0 }
      - { label: "Moderate", max: 15.0 }
      - { label: "Bad", max: 25.0 }
      - { label: "Severe" }

  - name: "ev_thresholds"
    bands:
      - { label: "No Bet", max: 0.0 }
      - { label: "Marginal", max: 0.03 }
      - { label: "Standard", max: 0.08 }
      - { label: "Strong", max: 0.15 }
      - { label: "Max Bet" }

# =============================================================================
# GOLDEN TESTS — Hand-computed expected values
# =============================================================================

golden_tests:
  # -------------------------------------------------------------------------
  # Golden #1: LAL_at_BOS — correct OVER prediction (Pinnacle)
  # Features: avg_pace=100.8, combined_off=226.4, combined_def=222.8,
  #           avg_recent_5=230.0, avg_recent_10=228.5, home_recent=231.0,
  #           stl=15.2, home_miss=0, away_miss=0, pace_delta=0.5
  # Predicted = -435.177 + 3.016*100.8 + 0.548*226.4 + 0.602*222.8
  #           + 0.064*230.0 + 0.331*228.5 + 0.047*231.0 - 0.018*15.2
  #           = 228.13
  # Pinnacle line=224.5, P_Over = 1 - Phi(-0.210) = 0.583
  # Calibrated (between 0.560/0.542 and 0.590/0.571): ~0.565
  # EV = 0.565*0.91 - 0.435 = 0.078
  # Actual=238 > 224.5 → Direction_Correct = 1
  # -------------------------------------------------------------------------

  - name: "lal_bos_predicted_total"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "LAL_at_BOS"
      Measure: "Predicted_Total"
    expect_within_epsilon:
      value: 228.13
      epsilon: 0.5

  - name: "lal_bos_p_over"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "LAL_at_BOS"
      Measure: "P_Over"
    expect_within_epsilon:
      value: 0.583
      epsilon: 0.01

  - name: "lal_bos_ev_positive"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "LAL_at_BOS"
      Measure: "EV_Per_Dollar"
    expect_within_epsilon:
      value: 0.078
      epsilon: 0.02

  - name: "lal_bos_direction_correct"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "LAL_at_BOS"
      Measure: "Direction_Correct"
    expect: 1.0

  # -------------------------------------------------------------------------
  # Golden #2: GSW_at_MIL — correct UNDER prediction (Pinnacle)
  # Predicted ~214.1, line=219.5, P_Over ~0.378 (under 0.5 → model says UNDER)
  # Actual=208 < 219.5 → model correct
  # -------------------------------------------------------------------------

  - name: "gsw_mil_predicts_under"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "GSW_at_MIL"
      Measure: "P_Over"
    expect_within_epsilon:
      value: 0.377
      epsilon: 0.02

  - name: "gsw_mil_direction_correct"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "GSW_at_MIL"
      Measure: "Direction_Correct"
    expect: 1.0

  # -------------------------------------------------------------------------
  # Golden #3: PHX_at_DEN — WRONG prediction (overconfidence + high pace miss)
  # avg_pace=103.2, Predicted ~238.9, Pinnacle line=232.5
  # P_Over ~0.645, Calibrated_P ~0.63 (>0.60)
  # Actual=215 < 232.5 → Direction_Correct=0 → Overconfidence fires
  # Abs_Error = |238.9 - 215| = 23.9 > 15, pace > 102 → High_Pace_Miss fires
  # -------------------------------------------------------------------------

  - name: "phx_den_overconfidence_flag"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_16"
      Sportsbook: "Pinnacle"
      Game: "PHX_at_DEN"
      Measure: "Overconfidence_Flag"
    expect: 1.0

  - name: "phx_den_high_pace_miss"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_16"
      Sportsbook: "Pinnacle"
      Game: "PHX_at_DEN"
      Measure: "High_Pace_Miss"
    expect: 1.0

  # -------------------------------------------------------------------------
  # Golden #4: DAL_at_MIN — cross-book EV differs (HEADLINE TEST)
  # Same game, same prediction (~228.3), but different lines per book:
  #   Pinnacle line=224.5 → P_Over ~0.587 → Cal ~0.568 → EV ~0.096
  #   DraftKings line=226.0 → P_Over ~0.553 → Cal ~0.535 → EV ~0.001
  # Proves Sportsbook dimension adds real analytical value.
  # -------------------------------------------------------------------------

  - name: "dal_min_ev_pinnacle"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_17"
      Sportsbook: "Pinnacle"
      Game: "DAL_at_MIN"
      Measure: "EV_Per_Dollar"
    expect_within_epsilon:
      value: 0.096
      epsilon: 0.025

  - name: "dal_min_ev_draftkings"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_17"
      Sportsbook: "DraftKings"
      Game: "DAL_at_MIN"
      Measure: "EV_Per_Dollar"
    expect_within_epsilon:
      value: 0.0
      epsilon: 0.02

  # -------------------------------------------------------------------------
  # Golden #5: Calibration check — NYK_at_MIA
  # Predicted ~233.3, Pinnacle line=227.5 → P_Over ~0.63
  # Calibrate: between 0.625/0.609 and 0.670/0.652 → ~0.615
  # Verifies PAVA piecewise-linear interpolation is working correctly
  # -------------------------------------------------------------------------

  - name: "calibration_at_known_point"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_17"
      Sportsbook: "Pinnacle"
      Game: "NYK_at_MIA"
      Measure: "Calibrated_P"
    expect_within_epsilon:
      value: 0.615
      epsilon: 0.015

  # -------------------------------------------------------------------------
  # Golden #6: Kelly = 0 for negative-EV game (GSW_at_MIL, model says UNDER)
  # P_Over ~0.377 → calibrated clamps to 0.487 → EV = 0.487*0.91 - 0.513 < 0
  # Kelly = 0 (proves abstention on negative-EV bets)
  # -------------------------------------------------------------------------

  - name: "gsw_mil_kelly_zero"
    coord:
      Scenario: "Base"
      Version: "Working"
      Time: "2026_04_15"
      Sportsbook: "Pinnacle"
      Game: "GSW_at_MIL"
      Measure: "Kelly_Fraction"
    expect: 0.0

  # -------------------------------------------------------------------------
  # Golden #7: Should_Bet differs across books for same game (HEADLINE TEST)
  # DAL_at_MIN: Pinnacle has EV=0.096>0.03 and Cal_P=0.568>0.56 → Should_Bet=1
  #             DraftKings has EV~0.001<0.03 → Should_Bet=0
