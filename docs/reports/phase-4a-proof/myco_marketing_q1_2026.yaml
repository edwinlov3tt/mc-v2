# MyCo_Marketing_Q1_2026 — Phase 4A end-to-end proof model.
#
# Authored using only the Mosaic plugin's skill content (skills/authoring,
# skills/schema-design, skills/formulas, skills/testing, skills/domain-schemas/
# marketing-mix). No kernel source consulted.
#
# Structure mirrors the Acme reference (marketing-mix domain pattern):
# - 6 dims in canonical order
# - 11 measures (6 Input + 5 Derived) with the canonical aggregation pairings
# - 5-rule funnel chain (Spend → Clicks → Leads → Customers → Revenue → Gross_Profit)
# Differences from Acme: 3 channels (Paid_Search, Email, Organic), 3 markets
# (Tampa, Orlando, Miami), Q1 only (Jan/Feb/Mar 2026 + Q1_2026 rollup).

model_format_version: 1

metadata:
  name: "MyCo_Marketing_Q1_2026"
  description: "Phase 4A fresh-instance proof — small marketing-mix model with 3 channels, 3 markets, Q1_2026 horizon."
  author: "Mosaic Phase 4A end-to-end proof"
  created: "2026-05-03"

dimensions:
  - name: "Scenario"
    description: "Plan branches the user can switch between."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Aggressive", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state of a plan revision."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Q1 2026 monthly grain rolling up to a single quarter."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Q1_2026" }

  - name: "Channel"
    description: "Three marketing channels (one paid, two owned/earned)."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Email" }
      - { name: "Organic" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Three Florida cities rolling up to a single state."
    kind: "Standard"
    elements:
      - { name: "Tampa" }
      - { name: "Orlando" }
      - { name: "Miami" }
      - { name: "Florida" }

  - name: "Measure"
    description: "Inputs (Spend, ratios) plus derived KPIs (Clicks → Gross_Profit)."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Search", weight: 1.0 }
      - { parent: "All_Channels", child: "Email", weight: 1.0 }
      - { parent: "All_Channels", child: "Organic", weight: 1.0 }

  - dimension: "Market"
    name: "Geographic"
    default: true
    edges:
      - { parent: "Florida", child: "Tampa", weight: 1.0 }
      - { parent: "Florida", child: "Orlando", weight: 1.0 }
      - { parent: "Florida", child: "Miami", weight: 1.0 }

measures:
  - { name: "Spend", description: "Marketing dollars allocated (USD).", role: "Input", data_type: "F64", aggregation: "Sum" }
  - { name: "CPC", description: "Cost per click (USD/click); Spend-weighted.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Spend" }
  - { name: "CVR", description: "Click-to-lead conversion rate; Clicks-weighted.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Clicks" }
  - { name: "Close_Rate", description: "Lead-to-customer close rate; Leads-weighted.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Leads" }
  - { name: "AOV", description: "Average order value (USD/customer); Customers-weighted.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Customers" }
  - { name: "COGS_Rate", description: "Cost-of-goods-sold rate (fraction); Revenue-weighted.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Revenue" }
  - { name: "Clicks", description: "Derived click volume; Spend / CPC at the leaf.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Leads", description: "Derived lead volume; Clicks * CVR at the leaf.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Customers", description: "Derived customer count; Leads * Close_Rate at the leaf.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Revenue", description: "Derived top-line revenue; Customers * AOV at the leaf.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Gross_Profit", description: "Derived gross profit; Revenue * (1 - COGS_Rate) at the leaf.", role: "Derived", data_type: "F64", aggregation: "Sum" }

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend / CPC"
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_leads"
    description: "Leads = Clicks * CVR."
    target_measure: "Leads"
    scope: "AllLeaves"
    body: "Clicks * CVR"
    declared_dependencies: ["Clicks", "CVR"]

  - name: "rule_customers"
    description: "Customers = Leads * Close_Rate."
    target_measure: "Customers"
    scope: "AllLeaves"
    body: "Leads * Close_Rate"
    declared_dependencies: ["Leads", "Close_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Customers * AOV."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Customers * AOV"
    declared_dependencies: ["Customers", "AOV"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate)."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * (1 - COGS_Rate)"
    declared_dependencies: ["Revenue", "COGS_Rate"]

# Inline tabular canonical_inputs — small enough for inline form per
# skills/testing/SKILL.md guidance ("≤ 50 rows; bigger fixtures use
# sibling CSV"). 27 rows = 1 scenario × 1 version × 3 months × 3 channels
# × 3 markets × 6 measures = 162 leaf cells worth of data; we populate
# only Mar_2026 / Paid_Search / Tampa as the anchor for goldens, plus
# one consolidation rollup (Q1 Spend = sum of Jan+Feb+Mar at one leaf).
canonical_inputs:
  columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
  inline:
    rows:
      # Mar_2026 / Paid_Search / Tampa anchor (mirrors Acme's t=3, c=0, m=0 anchor)
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "Spend",      11500.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "CPC",        1.50]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "CVR",        0.020]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "Close_Rate", 0.10]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "AOV",        200.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Tampa", "COGS_Rate",  0.30]
      # Jan_2026 / Paid_Search / Tampa (for the Q1 consolidation rollup golden)
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "Spend",      10500.0]
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "CPC",        1.50]
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "CVR",        0.020]
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "Close_Rate", 0.10]
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "AOV",        200.0]
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "Tampa", "COGS_Rate",  0.30]
      # Feb_2026 / Paid_Search / Tampa (for Q1 rollup)
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "Spend",      11000.0]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "CPC",        1.50]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "CVR",        0.020]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "Close_Rate", 0.10]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "AOV",        200.0]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "Tampa", "COGS_Rate",  0.30]

golden_tests:
  # Input anchor (per skills/testing recommendation: 1 input anchor)
  - name: "spend_input_anchor_mar_paid_search_tampa"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Tampa"
      Measure: "Spend"
    expect: 11500.0

  # End-of-chain derived anchor (per skills/testing: 1 end-of-chain anchor)
  # Gross_Profit = Revenue * (1 - COGS_Rate) =
  #   = (Customers * AOV) * (1 - COGS_Rate)
  #   = (Leads * Close_Rate * AOV) * (1 - COGS_Rate)
  #   = (Clicks * CVR * Close_Rate * AOV) * (1 - COGS_Rate)
  #   = (Spend / CPC) * CVR * Close_Rate * AOV * (1 - COGS_Rate)
  #   = (11500 / 1.5) * 0.020 * 0.10 * 200 * (1 - 0.30)
  #   = 7666.667 * 0.020 * 0.10 * 200 * 0.7
  #   = 153.333 * 0.10 * 200 * 0.7
  #   = 15.333 * 200 * 0.7
  #   = 3066.667 * 0.7
  #   = 2146.667
  - name: "gross_profit_anchor_mar_paid_search_tampa"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Tampa"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 2146.6666666666667, epsilon: 1.0e-9 }

  # Consolidation rollup (per skills/testing: 1 consolidation golden)
  # Q1 Spend at Paid_Search / Tampa = Jan + Feb + Mar = 10500 + 11000 + 11500 = 33000
  - name: "spend_consolidated_q1_paid_search_tampa"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q1_2026"
      Channel: "Paid_Search"
      Market: "Tampa"
      Measure: "Spend"
    expect: 33000.0
