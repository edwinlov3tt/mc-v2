# Q4 lift fixture: 50% spend lift on Paid_Search in October.
# Other channels and rates remain at canonical_inputs values.
test_fixtures:
  - name: "q4_paid_search_lift"
    columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
    inline:
      rows:
        - ["Baseline", "Working", "Jan_2026", "Paid_Search", "All_Markets", "Spend", 12000.0]

# Goldens.
# Mar_2026 / Paid_Search anchor:
#   Spend 9000, CPC 2.00, Trial_Rate 0.040, Trial_Conversion 0.20,
#   ARPU 50.0, Gross_Margin_Rate 0.80
#   Clicks    = 9000 / 2.00          = 4500
#   Trials    = 4500 * 0.040         = 180
#   Customers = 180  * 0.20          = 36
#   Revenue   = 36   * 50.0          = 1800
#   Gross_Profit = 1800 * 0.80       = 1440
#
# Q1_2026 Paid_Search Spend rollup:
#   Jan + Feb + Mar = 8000 + 8500 + 9000 = 25500
#
# Q4 lift fixture: re-writes Jan_2026 Paid_Search Spend to 12000.
golden_tests:
  - name: "spend_input_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Spend"
    expect: 9000.0

  - name: "cpc_input_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "CPC"
    expect: 2.00

  - name: "clicks_derived_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Clicks"
    expect_within_epsilon: { value: 4500.0, epsilon: 1.0e-9 }

  - name: "trials_derived_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Trials"
    expect_within_epsilon: { value: 180.0, epsilon: 1.0e-9 }

  - name: "customers_derived_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Customers"
    expect_within_epsilon: { value: 36.0, epsilon: 1.0e-9 }

  - name: "revenue_derived_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Revenue"
    expect_within_epsilon: { value: 1800.0, epsilon: 1.0e-9 }

  - name: "gross_profit_derived_anchor_mar_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 1440.0, epsilon: 1.0e-9 }

  - name: "spend_consolidated_q1_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q1_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Spend"
    expect: 25500.0

  - name: "spend_q4_lift_jan_paid_search"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Jan_2026"
      Channel: "Paid_Search"
      Market: "All_Markets"
      Measure: "Spend"
    expect: 12000.0
    fixture: "q4_paid_search_lift"
