model_format_version: 1

metadata:
  name: "B2C_SaaS_Marketing_FY26"
  description: "5-channel B2C SaaS marketing-mix plan with monthly seasonality and a Q4 lift fixture."
  author: "Mosaic Authoring Assistant"
  created: "2026-01-15"

dimensions:
  - name: "Scenario"
    description: "Plan branches: baseline plus aggressive/conservative alternates for what-if planning."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Aggressive", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state of a plan revision (draft to submitted to approved)."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Calendar months of FY26 rolling up to quarters and full year."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Apr_2026" }
      - { name: "May_2026" }
      - { name: "Jun_2026" }
      - { name: "Jul_2026" }
      - { name: "Aug_2026" }
      - { name: "Sep_2026" }
      - { name: "Oct_2026" }
      - { name: "Nov_2026" }
      - { name: "Dec_2026" }
      - { name: "Q1_2026" }
      - { name: "Q2_2026" }
      - { name: "Q3_2026" }
      - { name: "Q4_2026" }
      - { name: "FY_2026" }

  - name: "Channel"
    description: "Five paid B2C SaaS acquisition channels grouped under All_Channels."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Affiliate" }
      - { name: "Email" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Single aggregate market for FY26; geographic split deferred to a future model."
    kind: "Standard"
    elements:
      - { name: "All_Markets" }

  - name: "Measure"
    description: "Inputs (Spend, CPC, conversion ratios, ARPU, margin) and derived KPIs (Clicks, Trials, Customers, Revenue, Gross_Profit)."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2026", child: "Q1_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q2_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q3_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q4_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Apr_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "May_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Jun_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Jul_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Aug_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Sep_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Oct_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Nov_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Dec_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Search", weight: 1.0 }
      - { parent: "All_Channels", child: "Paid_Social", weight: 1.0 }
      - { parent: "All_Channels", child: "Display", weight: 1.0 }
      - { parent: "All_Channels", child: "Affiliate", weight: 1.0 }
      - { parent: "All_Channels", child: "Email", weight: 1.0 }

measures:
  - name: "Spend"
    description: "Marketing dollars allocated to a channel/period (USD)."
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"
  - name: "CPC"
    description: "Cost per click (USD/click); rolls up as a Spend-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Spend"
  - name: "Trial_Rate"
    description: "Click-to-trial conversion rate (trials/click); rolls up as a Clicks-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Clicks"
  - name: "Trial_Conversion"
    description: "Trial-to-paid conversion rate (customers/trial); rolls up as a Trials-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Trials"
  - name: "ARPU"
    description: "Average revenue per user per month (USD/customer); rolls up as a Customers-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Customers"
  - name: "Gross_Margin_Rate"
    description: "Gross margin rate (fraction of revenue); rolls up as a Revenue-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Revenue"
  - name: "Clicks"
    description: "Derived click volume; computed as Spend / CPC at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
  - name: "Trials"
    description: "Derived trial volume; computed as Clicks * Trial_Rate at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
  - name: "Customers"
    description: "Derived paying customer count; computed as Trials * Trial_Conversion at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
  - name: "Revenue"
    description: "Derived monthly recurring revenue (USD); computed as Customers * ARPU at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"
  - name: "Gross_Profit"
    description: "Derived gross profit (USD); Revenue * Gross_Margin_Rate at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC; translates marketing dollars into click volume."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend / CPC"
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_trials"
    description: "Trials = Clicks * Trial_Rate; applies the click-to-trial conversion rate."
    target_measure: "Trials"
    scope: "AllLeaves"
    body: "Clicks * Trial_Rate"
    declared_dependencies: ["Clicks", "Trial_Rate"]

  - name: "rule_customers"
    description: "Customers = Trials * Trial_Conversion; applies the trial-to-paid conversion rate."
    target_measure: "Customers"
    scope: "AllLeaves"
    body: "Trials * Trial_Conversion"
    declared_dependencies: ["Trials", "Trial_Conversion"]

  - name: "rule_revenue"
    description: "Revenue = Customers * ARPU; monthly recurring revenue from paying customers."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Customers * ARPU"
    declared_dependencies: ["Customers", "ARPU"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * Gross_Margin_Rate; revenue net of cost of goods sold."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * Gross_Margin_Rate"
    declared_dependencies: ["Revenue", "Gross_Margin_Rate"]

