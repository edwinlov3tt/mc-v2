model_format_version: 1

metadata:
  name: "B2C_SaaS_Marketing_FY26"
  description: "5-channel B2C SaaS marketing-mix plan — monthly seasonality with Q4 lift scenario."
  author: "Mosaic Authoring Assistant"
  created: "2026-05-02"

dimensions:
  - name: "Scenario"
    description: "Plan branches: Baseline, Q4_Lift (boost paid in Oct-Dec), Conservative."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Q4_Lift", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state of a plan revision."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "FY26 calendar months rolling up to quarters and full year — captures monthly seasonality."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Apr_2026" }
      - { name: "May_2026" }
      - { name: "Jun_2026" }
      - { name: "Jul_2026" }
      - { name: "Aug_2026" }
      - { name: "Sep_2026" }
      - { name: "Oct_2026" }
      - { name: "Nov_2026" }
      - { name: "Dec_2026" }
      - { name: "Q1_2026" }
      - { name: "Q2_2026" }
      - { name: "Q3_2026" }
      - { name: "Q4_2026" }
      - { name: "FY_2026" }

  - name: "Channel"
    description: "Five marketing channels (Paid_Search, Paid_Social, Display, Content, Affiliate) grouped into Paid_Media and Owned_Earned families."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Content" }
      - { name: "Affiliate" }
      - { name: "Paid_Media" }
      - { name: "Owned_Earned" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "B2C SaaS markets — single-element placeholder (global digital reach)."
    kind: "Standard"
    elements:
      - { name: "Global" }

  - name: "Measure"
    description: "Inputs (Spend, ratios) and derived KPIs (Clicks, Trials, Subscribers, Revenue, Gross_Profit)."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2026", child: "Q1_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q2_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q3_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q4_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Apr_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "May_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Jun_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Jul_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Aug_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Sep_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Oct_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Nov_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Dec_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Media", weight: 1.0 }
      - { parent: "All_Channels", child: "Owned_Earned", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Search", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Social", weight: 1.0 }
      - { parent: "Paid_Media", child: "Display", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Content", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Affiliate", weight: 1.0 }

measures:
  - name: "Spend"
    description: "Marketing dollars allocated to a channel/period (USD)."
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"

  - name: "CPC"
    description: "Cost per click (USD/click); rolls up as a Spend-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Spend"

  - name: "Trial_Rate"
    description: "Click-to-trial signup rate (trials/click); rolls up as a Clicks-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Clicks"

  - name: "Conversion_Rate"
    description: "Trial-to-paid-subscriber conversion rate (subscribers/trial); rolls up as a Trials-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Trials"

  - name: "ARPU"
    description: "Average revenue per subscriber per month (USD/subscriber); rolls up as a Subscribers-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Subscribers"

  - name: "COGS_Rate"
    description: "Cost-of-goods-sold rate as a fraction of revenue (hosting, support); rolls up as a Revenue-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Revenue"

  - name: "Clicks"
    description: "Derived click volume; computed as Spend / CPC at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Trials"
    description: "Derived trial signups; computed as Clicks * Trial_Rate at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Subscribers"
    description: "Derived paid subscriber count; computed as Trials * Conversion_Rate at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Revenue"
    description: "Derived monthly subscription revenue (USD); computed as Subscribers * ARPU at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Gross_Profit"
    description: "Derived gross profit (USD); Revenue * (1 - COGS_Rate) at the leaf level."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC — translate marketing dollars into click volume."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend / CPC"
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_trials"
    description: "Trials = Clicks * Trial_Rate — apply the click-to-trial signup rate."
    target_measure: "Trials"
    scope: "AllLeaves"
    body: "Clicks * Trial_Rate"
    declared_dependencies: ["Clicks", "Trial_Rate"]

  - name: "rule_subscribers"
    description: "Subscribers = Trials * Conversion_Rate — apply the trial-to-paid conversion rate."
    target_measure: "Subscribers"
    scope: "AllLeaves"
    body: "Trials * Conversion_Rate"
    declared_dependencies: ["Trials", "Conversion_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Subscribers * ARPU — monthly subscription revenue."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Subscribers * ARPU"
    declared_dependencies: ["Subscribers", "ARPU"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate) — revenue net of cost of goods sold."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * (1 - COGS_Rate)"
    declared_dependencies: ["Revenue", "COGS_Rate"]

canonical_inputs:
  columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
  inline:
    rows:
      # Baseline / Working / Mar_2026 / Paid_Search / Global — anchor coord for goldens.
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "Spend", 50000.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "CPC", 2.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "Trial_Rate", 0.04]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "Conversion_Rate", 0.15]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "ARPU", 25.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "Global", "COGS_Rate", 0.25]

test_fixtures:
  - name: "q4_lift_oct_paid_search_boost"
    columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
    inline:
      rows:
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "Spend", 75000.0]
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "CPC", 2.50]
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "Trial_Rate", 0.05]
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "Conversion_Rate", 0.20]
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "ARPU", 30.0]
        - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "Global", "COGS_Rate", 0.25]

golden_tests:
  # Baseline input anchors at Mar_2026 / Paid_Search / Global.
  - name: "baseline_spend_input_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Spend"
    expect: 50000.0

  - name: "baseline_cpc_input_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "CPC"
    expect: 2.0

  - name: "baseline_arpu_input_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "ARPU"
    expect: 25.0

  # Baseline derived chain at Mar_2026 / Paid_Search / Global:
  #   Clicks = 50000 / 2.0 = 25000
  #   Trials = 25000 * 0.04 = 1000
  #   Subscribers = 1000 * 0.15 = 150
  #   Revenue = 150 * 25.0 = 3750
  #   Gross_Profit = 3750 * (1 - 0.25) = 2812.5
  - name: "baseline_clicks_derived_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Clicks"
    expect_within_epsilon: { value: 25000.0, epsilon: 1.0e-9 }

  - name: "baseline_trials_derived_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Trials"
    expect_within_epsilon: { value: 1000.0, epsilon: 1.0e-9 }

  - name: "baseline_subscribers_derived_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Subscribers"
    expect_within_epsilon: { value: 150.0, epsilon: 1.0e-9 }

  - name: "baseline_revenue_derived_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Revenue"
    expect_within_epsilon: { value: 3750.0, epsilon: 1.0e-9 }

  - name: "baseline_gross_profit_derived_anchor"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 2812.5, epsilon: 1.0e-9 }

  # Q4_Lift scenario derived chain at Oct_2026 / Paid_Search / Global (via fixture):
  #   Clicks = 75000 / 2.50 = 30000
  #   Trials = 30000 * 0.05 = 1500
  #   Subscribers = 1500 * 0.20 = 300
  #   Revenue = 300 * 30.0 = 9000
  #   Gross_Profit = 9000 * (1 - 0.25) = 6750
  - name: "q4_lift_revenue_derived_anchor"
    coord:
      Scenario: "Q4_Lift"
      Version: "Working"
      Time: "Oct_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Revenue"
    expect_within_epsilon: { value: 9000.0, epsilon: 1.0e-9 }
    fixture: "q4_lift_oct_paid_search_boost"

  - name: "q4_lift_gross_profit_derived_anchor"
    coord:
      Scenario: "Q4_Lift"
      Version: "Working"
      Time: "Oct_2026"
      Channel: "Paid_Search"
      Market: "Global"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 6750.0, epsilon: 1.0e-9 }
    fixture: "q4_lift_oct_paid_search_boost"
