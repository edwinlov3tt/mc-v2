metadata:
  name: "B2C_SaaS_MarketingMix_FY26"
  description: "5-channel B2C SaaS marketing-mix plan for FY26 with monthly seasonality + Q4 lift scenario."
  author: "Mosaic Authoring Assistant"
  created: "2026-05-02"

dimensions:
  - name: "Scenario"
    description: "Plan branches: baseline plus a Q4 lift scenario that boosts paid spend in Oct-Dec."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Q4_Lift", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state of a plan revision (draft → submitted → approved)."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Calendar months for FY26 with quarter and full-year rollups."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Apr_2026" }
      - { name: "May_2026" }
      - { name: "Jun_2026" }
      - { name: "Jul_2026" }
      - { name: "Aug_2026" }
      - { name: "Sep_2026" }
      - { name: "Oct_2026" }
      - { name: "Nov_2026" }
      - { name: "Dec_2026" }
      - { name: "Q1_2026" }
      - { name: "Q2_2026" }
      - { name: "Q3_2026" }
      - { name: "Q4_2026" }
      - { name: "FY_2026" }

  - name: "Channel"
    description: "Five B2C SaaS acquisition channels grouped into Paid_Media and Owned_Earned families."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Content_SEO" }
      - { name: "Email" }
      - { name: "Paid_Media" }
      - { name: "Owned_Earned" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Single-market placeholder for a US-only B2C SaaS launch plan."
    kind: "Standard"
    elements:
      - { name: "US" }

  - name: "Measure"
    description: "Inputs (Spend, ratios) and derived KPIs (Clicks, Trials, Subscribers, Revenue, Gross_Profit)."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2026", child: "Q1_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q2_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q3_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q4_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Apr_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "May_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Jun_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Jul_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Aug_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Sep_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Oct_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Nov_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Dec_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Media", weight: 1.0 }
      - { parent: "All_Channels", child: "Owned_Earned", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Search", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Social", weight: 1.0 }
      - { parent: "Paid_Media", child: "Display", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Content_SEO", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Email", weight: 1.0 }

measures:
  - { name: "Spend", description: "Marketing dollars allocated to a channel/period (USD).", role: "Input", data_type: "F64", aggregation: "Sum" }
  - { name: "CPC", description: "Cost per click (USD/click); rolls up as a Spend-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Spend" }
  - { name: "CVR", description: "Click-to-trial-signup conversion rate; rolls up as a Clicks-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Clicks" }
  - { name: "Trial_Rate", description: "Trial-to-paid-subscriber conversion rate; rolls up as a Trials-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Trials" }
  - { name: "ARPU", description: "Average revenue per user per month (USD); rolls up as a Subscribers-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Subscribers" }
  - { name: "COGS_Rate", description: "Cost-of-goods-sold rate (fraction of revenue); rolls up as a Revenue-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Revenue" }
  - { name: "Clicks", description: "Derived click volume; computed as Spend / CPC at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Trials", description: "Derived trial signups; computed as Clicks * CVR at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Subscribers", description: "Derived paid subscribers; computed as Trials * Trial_Rate at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Revenue", description: "Derived monthly subscription revenue (USD); Subscribers * ARPU at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Gross_Profit", description: "Derived gross profit (USD); Revenue * (1 - COGS_Rate) at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC — translate marketing dollars into click volume."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend / CPC"
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_trials"
    description: "Trials = Clicks * CVR — apply the click-to-trial conversion rate."
    target_measure: "Trials"
    scope: "AllLeaves"
    body: "Clicks * CVR"
    declared_dependencies: ["Clicks", "CVR"]

  - name: "rule_subscribers"
    description: "Subscribers = Trials * Trial_Rate — apply the trial-to-paid conversion rate."
    target_measure: "Subscribers"
    scope: "AllLeaves"
    body: "Trials * Trial_Rate"
    declared_dependencies: ["Trials", "Trial_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Subscribers * ARPU — top-line subscription revenue."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Subscribers * ARPU"
    declared_dependencies: ["Subscribers", "ARPU"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate) — revenue net of cost of goods sold."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * (1 - COGS_Rate)"
    declared_dependencies: ["Revenue", "COGS_Rate"]

test_fixtures:
  - name: "q4_lift_paid_search_us"
    columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
    inline:
      rows:
        # Q4 lift overlay: boost Paid_Search spend +50% in Oct/Nov/Dec
        - ["Baseline", "Working", "Oct_2026", "Paid_Search", "US", "Spend", 17250.0]
        - ["Baseline", "Working", "Nov_2026", "Paid_Search", "US", "Spend", 19500.0]
        - ["Baseline", "Working", "Dec_2026", "Paid_Search", "US", "Spend", 18750.0]

golden_tests:
  # Input anchor: Mar_2026 Spend at Paid_Search / US.
  - name: "spend_input_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Spend"
    expect: 9500.0

  # Input anchor: Mar_2026 ARPU at Paid_Search / US.
  - name: "arpu_input_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "ARPU"
    expect: 50.0

  # Derived chain at Mar_2026 / Paid_Search / US:
  #   Clicks       = 9500 / 1.50          = 6333.333…
  #   Trials       = 6333.333… * 0.040    = 253.333…
  #   Subscribers  = 253.333… * 0.50      = 126.666…
  #   Revenue      = 126.666… * 50.0      = 6333.333…
  #   Gross_Profit = 6333.333… * (1-0.25) = 4750.0
  - name: "clicks_derived_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Clicks"
    expect_within_epsilon: { value: 6333.333333333333, epsilon: 1.0e-9 }

  - name: "trials_derived_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Trials"
    expect_within_epsilon: { value: 253.33333333333334, epsilon: 1.0e-9 }

  - name: "subscribers_derived_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Subscribers"
    expect_within_epsilon: { value: 126.66666666666667, epsilon: 1.0e-9 }

  - name: "revenue_derived_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Revenue"
    expect_within_epsilon: { value: 6333.333333333334, epsilon: 1.0e-9 }

  - name: "gross_profit_derived_anchor_mar_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 4750.0, epsilon: 1.0e-9 }

  # Consolidation: Q1_2026 Spend at Paid_Search / US =
  #   Jan(8500) + Feb(9000) + Mar(9500) = 27000.
  - name: "spend_consolidated_q1_paid_search_us"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q1_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Spend"
    expect: 27000.0

  # Consolidation: Q4_2026 Spend at Paid_Search / US =
  #   Oct(11500) + Nov(13000) + Dec(12500) = 37000.
  - name: "spend_consolidated_q4_paid_search_us_baseline"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q4_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Spend"
    expect: 37000.0

  # Q4 lift fixture overlay: Q4_2026 Spend at Paid_Search / US =
  #   Oct(17250) + Nov(19500) + Dec(18750) = 55500.
  - name: "spend_consolidated_q4_paid_search_us_with_lift"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q4_2026"
      Channel: "Paid_Search"
      Market: "US"
      Measure: "Spend"
    expect: 55500.0
    fixture: "q4_lift_paid_search_us"
