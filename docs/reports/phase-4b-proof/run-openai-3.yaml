model_format_version: 1

canonical_inputs:
  columns: ["Scenario", "Version", "Time", "Channel", "Market", "Measure", "value"]
  inline:
    rows:
      - ["Baseline", "Working", "Jan_2026", "Paid_Search", "United_States", "Spend", 10000.0]
      - ["Baseline", "Working", "Feb_2026", "Paid_Search", "United_States", "Spend", 11000.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "Spend", 12000.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "CPC", 2.00]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "CVR", 0.050]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "Close_Rate", 0.20]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "AOV", 500.0]
      - ["Baseline", "Working", "Mar_2026", "Paid_Search", "United_States", "COGS_Rate", 0.25]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "Spend", 18000.0]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "CPC", 1.80]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "CVR", 0.060]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "Close_Rate", 0.22]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "AOV", 550.0]
      - ["Q4_Lift", "Working", "Oct_2026", "Paid_Search", "United_States", "COGS_Rate", 0.25]

metadata:
  name: "B2C_SaaS_MarketingMix_Q4Lift"
  description: "Marketing-mix planning model for a 5-channel B2C SaaS business with monthly seasonality and a Q4 lift scenario."
  author: "Mosaic Authoring Assistant"
  created: "2026-05-04"

dimensions:
  - name: "Scenario"
    description: "Planning scenarios for baseline operations, a Q4 growth lift, and conservative downside analysis."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Q4_Lift", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow states for draft, submitted, and approved planning revisions."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Monthly 2026 planning periods rolling up to quarters and fiscal year."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Apr_2026" }
      - { name: "May_2026" }
      - { name: "Jun_2026" }
      - { name: "Jul_2026" }
      - { name: "Aug_2026" }
      - { name: "Sep_2026" }
      - { name: "Oct_2026" }
      - { name: "Nov_2026" }
      - { name: "Dec_2026" }
      - { name: "Q1_2026" }
      - { name: "Q2_2026" }
      - { name: "Q3_2026" }
      - { name: "Q4_2026" }
      - { name: "FY_2026" }

  - name: "Channel"
    description: "Five B2C SaaS acquisition channels grouped into paid media and owned or earned channels."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Email" }
      - { name: "Organic" }
      - { name: "Paid_Media" }
      - { name: "Owned_Earned" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Core B2C SaaS geographic markets rolling up to regional and global totals."
    kind: "Standard"
    elements:
      - { name: "United_States" }
      - { name: "Canada" }
      - { name: "United_Kingdom" }
      - { name: "North_America" }
      - { name: "EMEA" }
      - { name: "Global" }

  - name: "Measure"
    description: "Marketing inputs and derived SaaS acquisition funnel KPIs."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2026", child: "Q1_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q2_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q3_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q4_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Apr_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "May_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Jun_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Jul_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Aug_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Sep_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Oct_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Nov_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Dec_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Media", weight: 1.0 }
      - { parent: "All_Channels", child: "Owned_Earned", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Search", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Social", weight: 1.0 }
      - { parent: "Paid_Media", child: "Display", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Email", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Organic", weight: 1.0 }

  - dimension: "Market"
    name: "Geographic"
    default: true
    edges:
      - { parent: "Global", child: "North_America", weight: 1.0 }
      - { parent: "Global", child: "EMEA", weight: 1.0 }
      - { parent: "North_America", child: "United_States", weight: 1.0 }
      - { parent: "North_America", child: "Canada", weight: 1.0 }
      - { parent: "EMEA", child: "United_Kingdom", weight: 1.0 }

measures:
  - name: "Spend"
    description: "Marketing dollars allocated to acquire and activate B2C SaaS users."
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"

  - name: "CPC"
    description: "Cost per click in USD, rolled up as a Spend-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Spend"

  - name: "CVR"
    description: "Click-to-lead conversion rate for the SaaS acquisition funnel, rolled up by Clicks."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Clicks"

  - name: "Close_Rate"
    description: "Lead-to-customer close rate for trial or demo conversion, rolled up by Leads."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Leads"

  - name: "AOV"
    description: "Average first-period order value or contract value per customer in USD, rolled up by Customers."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Customers"

  - name: "COGS_Rate"
    description: "Cost-of-goods-sold rate as a fraction of revenue, rolled up by Revenue."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Revenue"

  - name: "Clicks"
    description: "Derived click volume produced by marketing spend at the leaf planning grain."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Leads"
    description: "Derived lead volume generated from clicks and conversion rate."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Customers"
    description: "Derived new customer count produced from leads and close rate."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Revenue"
    description: "Derived top-line revenue from new customers and average order value."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Gross_Profit"
    description: "Derived gross profit after applying the cost-of-goods-sold rate to revenue."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC — convert marketing dollars into click volume."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend / CPC"
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_leads"
    description: "Leads = Clicks * CVR — convert clicks into leads."
    target_measure: "Leads"
    scope: "AllLeaves"
    body: "Clicks * CVR"
    declared_dependencies: ["Clicks", "CVR"]

  - name: "rule_customers"
    description: "Customers = Leads * Close_Rate — convert leads into new SaaS customers."
    target_measure: "Customers"
    scope: "AllLeaves"
    body: "Leads * Close_Rate"
    declared_dependencies: ["Leads", "Close_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Customers * AOV — compute top-line revenue from acquired customers."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Customers * AOV"
    declared_dependencies: ["Customers", "AOV"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate) — compute revenue net of cost of goods sold."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * (1 - COGS_Rate)"
    declared_dependencies: ["Revenue", "COGS_Rate"]

golden_tests:
  - name: "spend_input_anchor_mar_paid_search_united_states"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "United_States"
      Measure: "Spend"
    expect: 12000.0

  - name: "cpc_input_anchor_mar_paid_search_united_states"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "United_States"
      Measure: "CPC"
    expect: 2.0

  - name: "aov_input_anchor_mar_paid_search_united_states"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "United_States"
