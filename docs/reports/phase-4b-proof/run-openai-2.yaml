      - ["Q4_Lift", "Working", "Oct_2027", "Paid_Search", "North_America", "CPC", 1.80]
      - ["Q4_Lift", "Working", "Oct_2027", "Paid_Search", "North_America", "CVR", 0.050]
      - ["Q4_Lift", "Working", "Oct_2027", "Paid_Search", "North_America", "Close_Rate", 0.28]
      - ["Q4_Lift", "Working", "Oct_2027", "Paid_Search", "North_America", "AOV", 130.0]
