metadata:
  name: "B2C_SaaS_Marketing_Mix_FY2027"
  description: "Marketing-mix model for a 5-channel B2C SaaS with monthly seasonality and a Q4 lift scenario."
  author: "Mosaic Authoring Assistant"
  created: "2026-05-04"

dimensions:
  - name: "Scenario"
    description: "Planning branches for baseline performance, Q4 lift upside, and a conservative downside case."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Q4_Lift", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state for draft, submitted, and approved marketing plans."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Monthly FY2027 planning periods rolling up to quarters and the full fiscal year."
    kind: "Standard"
    elements:
      - { name: "Jan_2027" }
      - { name: "Feb_2027" }
      - { name: "Mar_2027" }
      - { name: "Apr_2027" }
      - { name: "May_2027" }
      - { name: "Jun_2027" }
      - { name: "Jul_2027" }
      - { name: "Aug_2027" }
      - { name: "Sep_2027" }
      - { name: "Oct_2027" }
      - { name: "Nov_2027" }
      - { name: "Dec_2027" }
      - { name: "Q1_2027" }
      - { name: "Q2_2027" }
      - { name: "Q3_2027" }
      - { name: "Q4_2027" }
      - { name: "FY_2027" }

  - name: "Channel"
    description: "Five B2C SaaS acquisition channels grouped into paid media and owned or earned channels."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Email" }
      - { name: "Organic" }
      - { name: "Paid_Media" }
      - { name: "Owned_Earned" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Primary SaaS commercial markets rolling up to a global total."
    kind: "Standard"
    elements:
      - { name: "North_America" }
      - { name: "Europe" }
      - { name: "Asia_Pacific" }
      - { name: "Global" }

  - name: "Measure"
    description: "Marketing spend, seasonal input assumptions, funnel ratios, and derived SaaS acquisition KPIs."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2027", child: "Q1_2027", weight: 1.0 }
      - { parent: "FY_2027", child: "Q2_2027", weight: 1.0 }
      - { parent: "FY_2027", child: "Q3_2027", weight: 1.0 }
      - { parent: "FY_2027", child: "Q4_2027", weight: 1.0 }
      - { parent: "Q1_2027", child: "Jan_2027", weight: 1.0 }
      - { parent: "Q1_2027", child: "Feb_2027", weight: 1.0 }
      - { parent: "Q1_2027", child: "Mar_2027", weight: 1.0 }
      - { parent: "Q2_2027", child: "Apr_2027", weight: 1.0 }
      - { parent: "Q2_2027", child: "May_2027", weight: 1.0 }
      - { parent: "Q2_2027", child: "Jun_2027", weight: 1.0 }
      - { parent: "Q3_2027", child: "Jul_2027", weight: 1.0 }
      - { parent: "Q3_2027", child: "Aug_2027", weight: 1.0 }
      - { parent: "Q3_2027", child: "Sep_2027", weight: 1.0 }
      - { parent: "Q4_2027", child: "Oct_2027", weight: 1.0 }
      - { parent: "Q4_2027", child: "Nov_2027", weight: 1.0 }
      - { parent: "Q4_2027", child: "Dec_2027", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Media", weight: 1.0 }
      - { parent: "All_Channels", child: "Owned_Earned", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Search", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Social", weight: 1.0 }
      - { parent: "Paid_Media", child: "Display", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Email", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Organic", weight: 1.0 }

  - dimension: "Market"
    name: "Geographic"
    default: true
    edges:
      - { parent: "Global", child: "North_America", weight: 1.0 }
      - { parent: "Global", child: "Europe", weight: 1.0 }
      - { parent: "Global", child: "Asia_Pacific", weight: 1.0 }

measures:
  - name: "Spend"
    description: "Marketing dollars allocated to a channel, market, and month before funnel conversion effects."
    role: "Input"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Seasonality_Index"
    description: "Monthly demand multiplier applied to spend-driven click volume; rolls up as a Spend-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Spend"

  - name: "CPC"
    description: "Cost per click in USD per click; rolls up as a Spend-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Spend"

  - name: "CVR"
    description: "Click-to-lead conversion rate for SaaS acquisition; rolls up as a Clicks-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Clicks"

  - name: "Close_Rate"
    description: "Lead-to-customer conversion rate for the SaaS funnel; rolls up as a Leads-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Leads"

  - name: "AOV"
    description: "Average first-period order value or subscription value per new customer; rolls up as a Customers-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Customers"

  - name: "COGS_Rate"
    description: "Cost-of-goods-sold rate as a fraction of revenue; rolls up as a Revenue-weighted average."
    role: "Input"
    data_type: "F64"
    aggregation: "WeightedAverage"
    weight_measure: "Revenue"

  - name: "Clicks"
    description: "Derived click volume after applying the monthly seasonality index to spend and CPC."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Leads"
    description: "Derived lead volume from clicks and the click-to-lead conversion rate."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Customers"
    description: "Derived new customer count from leads and the close rate."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Revenue"
    description: "Derived top-line SaaS acquisition revenue from customers and average order value."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

  - name: "Gross_Profit"
    description: "Derived gross profit after applying the cost-of-goods-sold rate to revenue."
    role: "Derived"
    data_type: "F64"
    aggregation: "Sum"

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend * Seasonality_Index / CPC — convert seasonally adjusted spend into click volume."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body: "Spend * Seasonality_Index / CPC"
    declared_dependencies: ["Spend", "Seasonality_Index", "CPC"]

  - name: "rule_leads"
    description: "Leads = Clicks * CVR — apply the click-to-lead conversion rate."
    target_measure: "Leads"
    scope: "AllLeaves"
    body: "Clicks * CVR"
    declared_dependencies: ["Clicks", "CVR"]

  - name: "rule_customers"
    description: "Customers = Leads * Close_Rate — apply the lead-to-customer close rate."
    target_measure: "Customers"
    scope: "AllLeaves"
    body: "Leads * Close_Rate"
    declared_dependencies: ["Leads", "Close_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Customers * AOV — calculate acquisition revenue from new customers."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body: "Customers * AOV"
    declared_dependencies: ["Customers", "AOV"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate) — calculate revenue net of cost of goods sold."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body: "Revenue * (1 - COGS_Rate)"
    declared_dependencies: ["Revenue", "COGS_Rate"]

golden_tests:
  - name: "spend_input_anchor_mar_paid_search_north_america"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Spend"
    expect: 12000.0

  - name: "seasonality_input_anchor_mar_paid_search_north_america"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Seasonality_Index"
    expect: 1.10

  - name: "clicks_derived_anchor_mar_paid_search_north_america"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Clicks"
    expect_within_epsilon: { value: 6600.0, epsilon: 1.0e-9 }

  - name: "gross_profit_derived_anchor_mar_paid_search_north_america"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 6336.0, epsilon: 1.0e-9 }

  - name: "gross_profit_q4_lift_anchor_oct_paid_search_north_america"
    coord:
      Scenario: "Q4_Lift"
      Version: "Working"
      Time: "Oct_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Gross_Profit"
    expect_within_epsilon: { value: 18928.0, epsilon: 1.0e-9 }

  - name: "spend_consolidated_q1_paid_search_north_america"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Q1_2027"
      Channel: "Paid_Search"
      Market: "North_America"
      Measure: "Spend"
    expect: 33000.0
