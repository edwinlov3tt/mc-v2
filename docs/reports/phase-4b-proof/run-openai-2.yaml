      - ["Baseline", "Working", "Feb_2027", "Paid_Search", "North_America", "Spend", 11000.0]
      - ["Baseline", "Working", "Mar_2027", "Paid_Search", "North_America", "Spend", 12000.0]
      - ["Baseline", "Working", "Mar_2027", "Paid_Search", "North_America", "Seasonality_Index", 1.10]
      - ["Baseline", "Working", "Mar_2027", "Paid_Search", "North_America", "CPC", 2.00]
