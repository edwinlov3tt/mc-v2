<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Mosaic 1M Cell Write Diagnostic Profile Fallback</title>
  <desc id="desc">macOS sample top-of-stack profile for baseline_writebatch/per_cell/1M. cargo-flamegraph was unavailable on Rust 1.78, so this SVG is a fallback bar profile, not a true flamegraph.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172026; }
    .muted { fill: #5d6972; font-size: 14px; }
    .label { font-size: 14px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 13px; }
    .bar { fill: #2f7f76; }
    .bar2 { fill: #a34f2a; }
    .grid { stroke: #d8dde1; stroke-width: 1; }
  </style>
  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="36" y="46" font-size="24" font-weight="700">1M Cell Write Profile - fallback artifact</text>
  <text x="36" y="74" class="muted">Benchmark: baseline_writebatch/per_cell/1M. Tool: /usr/bin/sample, 30s, 25,434 samples, macOS 26.3 on Apple M4.</text>
  <text x="36" y="98" class="muted">cargo-flamegraph could not be installed on pinned rustc 1.78.0; see report for install errors.</text>

  <text x="36" y="138" font-size="18" font-weight="700">Top of stack samples</text>
