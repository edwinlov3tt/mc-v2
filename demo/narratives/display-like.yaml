# Narrative templates for all tactic types
# (Display, Addressable, Social, Video, SEM)
#
# These fire based on `when:` predicates and `table_types:` matching.
# No Rust code changes needed to add/modify templates.
#
# SUPPORTED functions in `when:` and `bindings:`:
#   if(cond, then, else)   abs(x)   not(x)   element_count(Dim)
#   count_where(cond, Dim)  any_where(cond, Dim)  names_where(cond, Dim)
#   first_where(cond, Dim).name / .Measure
#   concat(a, b, ...)  format(num, spec)  round(val, n)
#   pct_change(cur, prev)  ratio(num, den)  plural(n, sing, plur)  coalesce(a, b, ...)
#   trend_slope(Measure)  trend_consistency(Measure)  streak(Measure)
#   best_period(Measure)  worst_period(Measure)  volatility(Measure)
#
# SUPPORTED variables:
#   current.<Measure>   prev.<Measure>   period_count   total_periods
#   first.<Measure>   last.<Measure>   first.period_name   last.period_name
#   min.<Measure>   max.<Measure>   min.<Measure>.period   max.<Measure>.period
#   sum.<Measure>   campaign_avg.<Measure>
#   max_by.<Dim>.<Measure>.name / .value
#   min_by.<Dim>.<Measure>.name / .value
#
# Format hints: {val:.0f} {val:,.0f} {val:.2f} {val:+.0f}

narrative_format_version: 1

templates:

  # ─── Campaign overview ──────────────────────────────────────

  - id: campaign_overview
    family: [display-like, search-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -20
    deduplicate: true
    when: "campaign_avg.CTR > 0"
    template: >
      **{period_count} {period_word}** of campaign data —
      **{total_impressions}** impressions,
      **{total_clicks}** clicks,
      **{avg_ctr:.2f}%** average CTR{conversion_note}.
    bindings:
      period_word: "plural(period_count, 'month', 'months')"
      total_impressions: "format(sum.Impressions, ',')"
      total_clicks: "format(sum.Clicks, ',')"
      avg_ctr: "campaign_avg.CTR"
      conversion_note: >
        if(sum.Conversions > 0,
          concat(', generating **', format(sum.Conversions, ','), '** conversions'),
          '')

  - id: data_sufficiency
    family: [display-like, video-like, search-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -10
    deduplicate: true
    when: "period_count <= 2"
    template: >
      {confidence}
    bindings:
      confidence: >
        if(period_count == 1,
          'Single-period snapshot — trend analysis requires 2+ months of data.',
          'Directional trends are visible but 3+ periods are recommended for confident assessment.')

  - id: small_sample_warning
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    deduplicate: true
    when: "count_where(Impressions < 500, geo_dimension) > 0"
    template: >
      {count} geographic {area_word} had fewer than 500
      impressions ({area_list}). CTR values for these areas
      should be considered directionally indicative only —
      sample sizes are insufficient for confident performance
      assessment.
    bindings:
      count: "count_where(Impressions < 500, geo_dimension)"
      area_word: "plural(count, 'area', 'areas')"
      area_list: "names_where(Impressions < 500, geo_dimension)"

  # ─── Time-series trends ─────────────────────────────────────

  - id: impressions_mom
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2"
    template: >
      Impressions {direction} **{abs_pct:.0f}%** from {prev_period}
      (**{prev_value:,.0f}**) to {current_period} (**{current_value:,.0f}**).
    bindings:
      direction: "if(current.Impressions >= prev.Impressions, 'grew', 'declined')"
      abs_pct: "abs(pct_change(current.Impressions, prev.Impressions))"
      prev_value: "prev.Impressions"
      current_value: "current.Impressions"
      prev_period: "prev.period_name"
      current_period: "current.period_name"

  - id: clicks_mom
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND abs(pct_change(current.Clicks, prev.Clicks)) > 10"
    template: >
      Clicks {verb} **{abs_pct:.0f}%** month-over-month
      (**{prev_value:,.0f}** → **{current_value:,.0f}**).
    bindings:
      verb: >
        if(abs_pct > 100, 'more than doubled',
          if(abs_pct > 50, 'surged',
            if(current.Clicks >= prev.Clicks, 'increased', 'declined')))
      abs_pct: "abs(pct_change(current.Clicks, prev.Clicks))"
      prev_value: "prev.Clicks"
      current_value: "current.Clicks"

  - id: ctr_trend
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND campaign_avg.CTR > 0 AND abs(current.CTR - prev.CTR) > 0.03"
    template: >
      CTR {direction} from **{prev_ctr:.2f}%** to **{current_ctr:.2f}%**
      ({change_pct:+.0f}% relative change).
    bindings:
      direction: "if(current.CTR >= prev.CTR, 'strengthened', 'weakened')"
      prev_ctr: "prev.CTR"
      current_ctr: "current.CTR"
      change_pct: "pct_change(current.CTR, prev.CTR)"

  - id: full_campaign_trend
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3 AND campaign_avg.CTR > 0"
    template: >
      Over **{period_count}** {period_word}, CTR moved from **{first_ctr:.2f}%**
      to **{last_ctr:.2f}%** — a **{slope}** and **{consistency}** trajectory.
      {peak_note}{streak_note}
    bindings:
      period_word: "plural(period_count, 'month', 'months')"
      first_ctr: "first.CTR"
      last_ctr: "last.CTR"
      slope: "trend_slope(CTR)"
      consistency: "trend_consistency(CTR)"
      peak_note: >
        concat('Peak performance was **', best_period(CTR), '** at **',
          format(max.CTR, '.2'), '%** CTR. ')
      streak_note: >
        if(streak(CTR) >= 3,
          concat('CTR has increased for **', streak(CTR), '** consecutive months.'),
          if(streak(CTR) <= -3,
            concat('CTR has declined for **', abs(streak(CTR)), '** consecutive months.'),
            ''))

  - id: monthly_run_rate
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2"
    template: >
      Average monthly delivery: **{avg_impressions}** impressions
      and **{avg_clicks}** clicks per month.
    bindings:
      avg_impressions: "format(sum.Impressions / period_count, ',.0')"
      avg_clicks: "format(sum.Clicks / period_count, ',.0')"

  - id: monthly_conversion_rate
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.Conversions > 0"
    template: >
      Generating **{avg_conversions:.0f}** conversions per month on average.
    bindings:
      avg_conversions: "sum.Conversions / period_count"

  - id: engagement_acceleration
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: >
      period_count >= 2
      AND abs(click_growth) > abs(impr_growth) * 1.5
      AND click_growth > 0
    template: >
      Engagement outpacing reach: clicks grew **{click_growth:.0f}%** while impressions
      grew only **{impr_growth:.0f}%** — the campaign is converting attention into action
      more efficiently.
    bindings:
      click_growth: "pct_change(current.Clicks, prev.Clicks)"
      impr_growth: "pct_change(current.Impressions, prev.Impressions)"

  - id: uniform_momentum
    family: [display-like, social-like]
    severity: success
    table_types: ["Monthly Performance"]
    when: >
      period_count >= 2
      AND current.Impressions > prev.Impressions
      AND current.Clicks > prev.Clicks
      AND current.CTR > prev.CTR
    template: >
      All key metrics improved: impressions (**+{impr_pct:.0f}%**), clicks
      (**+{click_pct:.0f}%**), and CTR (**+{ctr_pct:.0f}%**). Uniform positive
      momentum — the campaign is strengthening, not trading one metric for another.
    bindings:
      impr_pct: "pct_change(current.Impressions, prev.Impressions)"
      click_pct: "pct_change(current.Clicks, prev.Clicks)"
      ctr_pct: "pct_change(current.CTR, prev.CTR)"

  - id: forecast_next_quarter
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3"
    template: >
      At current run rate, the next **90 days** would deliver approximately
      **{proj_impressions}** impressions and **{proj_clicks}** clicks.
    bindings:
      proj_impressions: "format(sum.Impressions / period_count * 3, ',.0')"
      proj_clicks: "format(sum.Clicks / period_count * 3, ',.0')"

  - id: forecast_conversions
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3 AND sum.Conversions > 0"
    template: >
      At current conversion rate, expect approximately
      **{proj_conversions:.0f}** conversions over the next 90 days.
    bindings:
      proj_conversions: "sum.Conversions / period_count * 3"

  # ─── Benchmark comparisons ──────────────────────────────────

  - id: ctr_vs_benchmark
    family: [display-like]
    severity: info
    table_types: ["Monthly Performance", "Campaign Performance"]
    when: "campaign_avg.CTR > 0"
    template: >
      Campaign CTR of **{campaign_ctr:.2f}%** is **{multiple:.1f}x** the
      industry average (**{benchmark}%**). {interpretation}
    bindings:
      campaign_ctr: "campaign_avg.CTR"
      benchmark: "0.10"
      multiple: "ratio(campaign_avg.CTR, 0.10)"
      interpretation: >
        if(campaign_avg.CTR > 0.30,
          'Strong creative-audience alignment.',
          if(campaign_avg.CTR > 0.10,
            'Targeting appears effective.',
            'Review targeting and creative.'))

  # ─── Device analysis ────────────────────────────────────────

  - id: device_ranking
    family: [display-like]
    severity: info
    table_types: ["Device Performance"]
    when: "element_count(Device) >= 2 AND campaign_avg.CTR > 0"
    template: >
      **{best_device}** was the top-performing device by engagement:
      **{best_ctr:.2f}%** CTR — {comparison} the campaign average.
      **{worst_device}** underperformed at **{worst_ctr:.2f}%** CTR.
    bindings:
      best_device: "max_by.Device.CTR.name"
      best_ctr: "max_by.Device.CTR.value"
      worst_device: "min_by.Device.CTR.name"
      worst_ctr: "min_by.Device.CTR.value"
      comparison: >
        if(max_by.Device.CTR.value > campaign_avg.CTR * 1.8, 'nearly 2x',
          if(max_by.Device.CTR.value > campaign_avg.CTR * 1.3, 'well above',
            'above'))

  - id: device_underperformance
    family: [display-like]
    severity: warning
    table_types: ["Device Performance"]
    when: "campaign_avg.CTR > 0 AND min_by.Device.CTR.value < campaign_avg.CTR * 0.25"
    template: >
      **{worst_device}** is significantly underperforming at
      **{worst_ctr:.2f}%** CTR — **{deficit:.0f}%** below the campaign
      average (**{avg_ctr:.2f}%**). This device served
      **{worst_impressions:,.0f}** impressions with minimal engagement.
    bindings:
      worst_device: "min_by.Device.CTR.name"
      worst_ctr: "min_by.Device.CTR.value"
      avg_ctr: "campaign_avg.CTR"
      deficit: "(1 - ratio(min_by.Device.CTR.value, campaign_avg.CTR)) * 100"
      worst_impressions: "min_by.Device.Impressions.value"

  # ─── Geographic analysis ────────────────────────────────────

  - id: geo_concentration
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    when: "ratio(max_by.geo.Impressions.value, sum.Impressions) > 0.70"
    template: >
      **{top_area}** accounts for **{share:.0f}%** of total impressions
      (**{top_value}** of **{total}**).
    bindings:
      top_area: "max_by.geo.Impressions.name"
      top_value: "format(max_by.geo.Impressions.value, ',.0')"
      total: "format(sum.Impressions, ',.0')"
      share: "ratio(max_by.geo.Impressions.value, sum.Impressions) * 100"

  - id: zero_engagement_alarm
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    deduplicate: true
    when: "any_where(Clicks == 0 AND Impressions > 50, geo_dimension)"
    template: >
      **{area_name}** received **{impressions:,.0f}** impressions with
      zero clicks. This area is consuming delivery with no
      engagement signal — evaluate whether geo-targeting includes
      this area intentionally.
    bindings:
      area_name: "first_where(Clicks == 0 AND Impressions > 50, geo_dimension).name"
      impressions: "first_where(Clicks == 0 AND Impressions > 50, geo_dimension).Impressions"

  # ─── Creative analysis ──────────────────────────────────────

  - id: top_creative
    family: [display-like]
    severity: info
    table_types: ["Creative By Name"]
    when: "element_count(Creative) >= 3 AND campaign_avg.CTR > 0"
    template: >
      Top creative: "**{best_name}**" at **{best_ctr:.2f}%** CTR across
      **{best_impressions}** impressions.
    bindings:
      best_name: "max_by.Creative.CTR.name"
      best_ctr: "max_by.Creative.CTR.value"
      best_impressions: "format(max_by.Creative.Impressions.value, ',.0')"

  # ─── Video-specific (YouTube, STV) ──────────────────────────

  - id: video_overview
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -15
    deduplicate: true
    when: "campaign_avg.VCR > 0"
    template: >
      **{period_count} {period_word}** of video campaign data —
      **{total_impressions}** impressions with
      **{avg_vcr:.1f}%** average completion rate.
    bindings:
      period_word: "plural(period_count, 'month', 'months')"
      total_impressions: "format(sum.Impressions, ',')"
      avg_vcr: "campaign_avg.VCR"

  - id: video_completions
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -14
    deduplicate: true
    when: "sum.Completions > 0"
    template: >
      **{total_completions}** full video completions across
      **{period_count}** {period_word}.
    bindings:
      total_completions: "format(sum.Completions, ',.0')"
      period_word: "plural(period_count, 'month', 'months')"

  - id: vcr_trend
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND campaign_avg.VCR > 0"
    template: >
      Video completion rate {direction} from **{prev_vcr:.1f}%** to
      **{current_vcr:.1f}%** ({change:+.1f} points).
    bindings:
      direction: "if(current.VCR >= prev.VCR, 'improved', 'declined')"
      prev_vcr: "prev.VCR"
      current_vcr: "current.VCR"
      change: "current.VCR - prev.VCR"

  - id: vcr_benchmark
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance", "Campaign Performance"]
    when: "campaign_avg.VCR > 0"
    template: >
      Campaign VCR of **{avg_vcr:.1f}%** is {assessment} the **50%** industry
      benchmark for video ads.
    bindings:
      avg_vcr: "campaign_avg.VCR"
      assessment: >
        if(campaign_avg.VCR > 70,
          'significantly above',
          if(campaign_avg.VCR > 50,
            'above',
            if(campaign_avg.VCR > 35,
              'near',
              'below')))

  - id: video_device_ranking
    family: [video-like]
    severity: info
    table_types: ["Device Performance"]
    when: "element_count(Device) >= 2 AND campaign_avg.VCR > 0"
    template: >
      **{best_device}** led with **{best_vcr:.1f}%** VCR.
      **{worst_device}** had the lowest at **{worst_vcr:.1f}%** VCR.
    bindings:
      best_device: "max_by.Device.VCR.name"
      best_vcr: "max_by.Device.VCR.value"
      worst_device: "min_by.Device.VCR.name"
      worst_vcr: "min_by.Device.VCR.value"

  - id: video_run_rate
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND campaign_avg.VCR > 0"
    template: >
      Average monthly delivery: **{avg_impressions}** video impressions
      with **{avg_vcr:.1f}%** completion rate per month.
    bindings:
      avg_impressions: "format(sum.Impressions / period_count, ',.0')"
      avg_vcr: "campaign_avg.VCR"

  - id: video_forecast
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3 AND campaign_avg.VCR > 0"
    template: >
      At current run rate, the next **90 days** would deliver approximately
      **{proj_impressions}** video impressions.
    bindings:
      proj_impressions: "format(sum.Impressions / period_count * 3, ',.0')"

  # ─── Social-specific (Meta) ─────────────────────────────────

  - id: social_engagement_overview
    family: [social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -14
    deduplicate: true
    when: "sum.Engagements > 0"
    template: >
      **{total_engagements}** post engagements across
      **{total_impressions}** impressions
      (**{engagement_rate:.2f}%** engagement rate).
    bindings:
      total_engagements: "format(sum.Engagements, ',')"
      total_impressions: "format(sum.Impressions, ',')"
      engagement_rate: "ratio(sum.Engagements, sum.Impressions) * 100"

  - id: social_lead_count
    family: [social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -13
    deduplicate: true
    when: "sum.Leads > 0"
    template: >
      **{total_leads}** leads generated across **{period_count}** {period_word}
      (**{avg_leads:.0f}** leads/month).
    bindings:
      total_leads: "format(sum.Leads, ',.0')"
      period_word: "plural(period_count, 'month', 'months')"
      avg_leads: "sum.Leads / period_count"

  - id: social_engagement_trend
    family: [social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.Engagements > 0 AND abs(pct_change(current.Engagements, prev.Engagements)) > 10"
    template: >
      Engagements {direction} **{abs_pct:.0f}%** month-over-month
      (**{prev_value:,.0f}** → **{current_value:,.0f}**).
    bindings:
      direction: "if(current.Engagements >= prev.Engagements, 'grew', 'declined')"
      abs_pct: "abs(pct_change(current.Engagements, prev.Engagements))"
      prev_value: "prev.Engagements"
      current_value: "current.Engagements"

  # ─── SEM-specific ───────────────────────────────────────────

  - id: sem_conversion_performance
    family: [search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.Conversions > 0"
    template: >
      SEM delivered **{total_conversions}** conversions across
      **{period_count}** {period_word} at **{avg_ctr:.1f}%** CTR.
    bindings:
      total_conversions: "format(sum.Conversions, ',.0')"
      period_word: "plural(period_count, 'month', 'months')"
      avg_ctr: "campaign_avg.CTR"

  # ─── Conversion tracking ────────────────────────────────────

  - id: conversion_alarm
    family: [display-like, video-like, search-like, social-like]
    severity: critical
    table_types: ["Campaign Performance", "Monthly Performance"]
    deduplicate: true
    when: "sum.Conversions == 0 AND sum.Impressions > 1000"
    template: >
      **Zero conversions** recorded across **{total_impressions:,.0f}** impressions
      over **{period_count}** reporting {period_word}. Verify conversion pixel installation
      and attribution window configuration.
    bindings:
      total_impressions: "sum.Impressions"
      period_word: "plural(period_count, 'period', 'periods')"
