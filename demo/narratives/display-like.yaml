# Narrative templates for display-like tactics
# (Targeted Display, Addressable Display, Social Display, Native)
#
# These are the actual template definitions that the narrative engine
# parses at startup and evaluates at request time. The engine is in
# crates/mc-demo-server/src/narrative.rs — it reads these YAML files,
# compiles the `when:` predicates, and evaluates them against populated
# cube data. No Rust code changes needed to add/modify templates.
#
# Template shape:
#   id:          unique identifier (used in evidence + payload)
#   family:      which tactic families this fires for
#   severity:    info | warning | critical
#   table_types: which report table types this template applies to
#   when:        predicate expression — template fires only if true
#   template:    output string with {placeholder} substitution
#   bindings:    named values computed from cube data, used in template
#
# Available variables in `when:` and `bindings:` expressions:
#   current.<Measure>       — value at the current (latest) time period
#   prev.<Measure>          — value at the previous time period
#   period_count            — number of distinct time periods in the cube
#   sum.<Measure>           — sum across all time periods
#   campaign_avg.<Measure>  — average across all time periods
#   max_by.<Dimension>.<Measure>  — element with highest value in that dimension
#   min_by.<Dimension>.<Measure>  — element with lowest value
#   count_where(<condition>, <Dimension>)  — count of elements matching condition
#   any_where(<condition>, <Dimension>)    — true if any element matches
#
# Format hints in template strings:
#   {value:.0f}   — integer (no decimals)
#   {value:.1f}   — one decimal
#   {value:.2f}   — two decimals
#   {value:,.0f}  — integer with commas (e.g., 55,757)
#   {value:+.0f}  — with sign prefix (+22, -5)

narrative_format_version: 1

templates:

  # ─── Campaign overview ──────────────────────────────────────

  - id: campaign_overview
    family: [display-like, video-like, search-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -20  # fires first — sets the stage
    deduplicate: true
    when: "true"
    template: >
      **{period_count} months** of campaign data —
      **{total_impressions:,.0f}** impressions,
      **{total_clicks:,.0f}** clicks,
      **{avg_ctr:.2f}%** average CTR{conversion_note}.
    bindings:
      total_impressions: "sum.Impressions"
      total_clicks: "sum.Clicks"
      avg_ctr: "campaign_avg.CTR"
      conversion_note: >
        if(sum.Conversions > 0,
          concat(', **', format(sum.Conversions, ',.0f'), '** conversions'),
          '')

  - id: data_sufficiency
    family: [display-like, video-like, search-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -10
    deduplicate: true
    when: "period_count <= 2"
    template: >
      {confidence}
    bindings:
      confidence: >
        if(period_count == 1,
          'Single-period snapshot — trend analysis requires 2+ months of data.',
          'Directional trends are visible but 3+ periods are recommended for confident assessment.')

  - id: small_sample_warning
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    deduplicate: true
    when: "count_where(Impressions < 500, geo_dimension) > 0"
    template: >
      {count} geographic area{plural} had fewer than 500
      impressions ({area_list}). CTR values for these areas
      should be considered directionally indicative only —
      sample sizes are insufficient for confident performance
      assessment.
    bindings:
      count: "count_where(Impressions < 500, geo_dimension)"
      plural: "if(count > 1, 's', '')"
      area_list: "names_where(Impressions < 500, geo_dimension)"

  # ─── Time-series trends ─────────────────────────────────────

  - id: impressions_mom
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2"
    template: >
      Impressions {direction} **{abs_pct:.0f}%** from {prev_period}
      (**{prev_value:,.0f}**) to {current_period} (**{current_value:,.0f}**).
    bindings:
      direction: "if(current.Impressions >= prev.Impressions, 'grew', 'declined')"
      abs_pct: "abs((current.Impressions - prev.Impressions) / prev.Impressions * 100)"
      prev_value: "prev.Impressions"
      current_value: "current.Impressions"
      prev_period: "prev.period_name"
      current_period: "current.period_name"

  - id: clicks_mom
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND abs((current.Clicks - prev.Clicks) / prev.Clicks) > 0.10"
    template: >
      Clicks {verb} **{abs_pct:.0f}%** month-over-month
      (**{prev_value:,.0f}** → **{current_value:,.0f}**).
    bindings:
      direction: "if(current.Clicks >= prev.Clicks, 'increasing', 'decreasing')"
      verb: >
        if(abs_pct > 100, 'more than doubled',
          if(abs_pct > 50, 'surged',
            if(current.Clicks >= prev.Clicks, 'increased', 'declined')))
      abs_pct: "abs((current.Clicks - prev.Clicks) / prev.Clicks * 100)"
      prev_value: "prev.Clicks"
      current_value: "current.Clicks"

  - id: ctr_trend
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND abs(current.CTR - prev.CTR) > 0.03"
    template: >
      CTR {direction} from **{prev_ctr:.2f}%** to **{current_ctr:.2f}%**
      ({change_pct:+.0f}% relative change).
    bindings:
      direction: "if(current.CTR >= prev.CTR, 'strengthened', 'weakened')"
      prev_ctr: "prev.CTR"
      current_ctr: "current.CTR"
      change_pct: "(current.CTR - prev.CTR) / prev.CTR * 100"

  - id: full_campaign_ctr_trend
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3"
    template: >
      Over the full **{period_count}-month** campaign, CTR moved from
      **{first_ctr:.2f}%** to **{last_ctr:.2f}%** — a
      **{total_change:+.0f}%** shift{assessment}.
    bindings:
      first_ctr: "first.CTR"
      last_ctr: "current.CTR"
      total_change: "(current.CTR - first.CTR) / first.CTR * 100"
      assessment: >
        if(total_change > 50,
          ', indicating strong campaign optimization over time',
          if(total_change > 10,
            ', suggesting gradual improvement in targeting or creative',
            if(total_change < -20,
              ' — creative refresh or audience expansion may be needed',
              ', holding relatively steady')))

  - id: monthly_run_rate
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2"
    template: >
      Average monthly delivery: **{avg_impressions:,.0f}** impressions
      and **{avg_clicks:,.0f}** clicks per month{efficiency_note}.
    bindings:
      avg_impressions: "sum.Impressions / period_count"
      avg_clicks: "sum.Clicks / period_count"
      efficiency_note: >
        if(sum.Conversions > 0,
          concat(' generating **', format(sum.Conversions / period_count, ',.0f'),
            '** conversions/month'),
          '')

  - id: engagement_acceleration
    family: [display-like, social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: >
      period_count >= 2
      AND abs(click_growth) > abs(impr_growth) * 1.5
      AND click_growth > 0
    template: >
      Engagement outpacing reach: clicks grew **{click_growth:.0f}%** while impressions
      grew only **{impr_growth:.0f}%** — the campaign is converting attention into action
      more efficiently.
    bindings:
      click_growth: "(current.Clicks - prev.Clicks) / prev.Clicks * 100"
      impr_growth: "(current.Impressions - prev.Impressions) / prev.Impressions * 100"

  - id: uniform_momentum
    family: [display-like, social-like]
    severity: success
    table_types: ["Monthly Performance"]
    when: >
      period_count >= 2
      AND current.Impressions > prev.Impressions
      AND current.Clicks > prev.Clicks
      AND current.CTR > prev.CTR
    template: >
      All key metrics improved: impressions (**+{impr_pct:.0f}%**), clicks
      (**+{click_pct:.0f}%**), and CTR (**+{ctr_pct:.0f}%**). Uniform positive
      momentum — the campaign is strengthening, not trading one metric for another.
    bindings:
      impr_pct: "(current.Impressions - prev.Impressions) / prev.Impressions * 100"
      click_pct: "(current.Clicks - prev.Clicks) / prev.Clicks * 100"
      ctr_pct: "(current.CTR - prev.CTR) / prev.CTR * 100"

  - id: forecast_next_quarter
    family: [display-like, social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3"
    template: >
      At current run rate, the next **90 days** would deliver approximately
      **{proj_impressions:,.0f}** impressions and **{proj_clicks:,.0f}** clicks{proj_conversions_note}.
    bindings:
      proj_impressions: "sum.Impressions / period_count * 3"
      proj_clicks: "sum.Clicks / period_count * 3"
      proj_conversions_note: >
        if(sum.Conversions > 0,
          concat(' with an estimated **', format(sum.Conversions / period_count * 3, ',.0f'),
            '** conversions'),
          '')

  - id: cost_efficiency
    family: [search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.Conversions > 0"
    template: >
      SEM delivered **{total_conversions:,.0f}** conversions at an average rate of
      **{avg_rate:.1f}%** across **{period_count}** months.
    bindings:
      total_conversions: "sum.Conversions"
      avg_rate: "campaign_avg.ConversionRate"

  # ─── Benchmark comparisons ──────────────────────────────────

  - id: ctr_vs_benchmark
    family: [display-like]
    severity: info
    table_types: ["Monthly Performance", "Campaign Performance"]
    when: "true"
    template: >
      Campaign CTR of **{campaign_ctr:.2f}%** is **{multiple:.1f}x** the
      industry average (**{benchmark}%**). {interpretation}
    bindings:
      campaign_ctr: "campaign_avg.CTR"
      benchmark: "0.10"
      multiple: "campaign_avg.CTR / 0.10"
      interpretation: >
        if(campaign_avg.CTR > 0.30,
          'Strong creative-audience alignment.',
          if(campaign_avg.CTR > 0.10,
            'Targeting appears effective.',
            'Review targeting and creative.'))

  # ─── Device analysis ────────────────────────────────────────

  - id: device_ranking
    family: [display-like]
    severity: info
    table_types: ["Device Performance"]
    when: "element_count(Device) >= 2"
    template: >
      {best_device} was the top-performing device by engagement:
      {best_ctr:.2f}% CTR — {comparison} the campaign average.
      {worst_device} underperformed at {worst_ctr:.2f}% CTR.
    bindings:
      best_device: "max_by.Device.CTR.name"
      best_ctr: "max_by.Device.CTR.value"
      worst_device: "min_by.Device.CTR.name"
      worst_ctr: "min_by.Device.CTR.value"
      comparison: >
        if(max_by.Device.CTR.value > campaign_avg.CTR * 1.8, 'nearly 2x',
          if(max_by.Device.CTR.value > campaign_avg.CTR * 1.3, 'well above',
            'above'))

  - id: device_underperformance
    family: [display-like]
    severity: warning
    table_types: ["Device Performance"]
    when: "min_by.Device.CTR.value < campaign_avg.CTR * 0.25"
    template: >
      {worst_device} is significantly underperforming at
      {worst_ctr:.2f}% CTR — {deficit:.0f}% below the campaign
      average ({avg_ctr:.2f}%). This device served
      {worst_impressions:,.0f} impressions with minimal engagement.
    bindings:
      worst_device: "min_by.Device.CTR.name"
      worst_ctr: "min_by.Device.CTR.value"
      avg_ctr: "campaign_avg.CTR"
      deficit: "(1 - min_by.Device.CTR.value / campaign_avg.CTR) * 100"
      worst_impressions: "min_by.Device.Impressions.value"

  # ─── Geographic analysis ────────────────────────────────────

  - id: geo_concentration
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    when: "max_by.geo.Impressions.value / sum.Impressions > 0.70"
    template: >
      {top_area} accounts for {share:.0f}% of total impressions
      ({top_value:,.0f} of {total:,.0f}).
    bindings:
      top_area: "max_by.geo.Impressions.name"
      top_value: "max_by.geo.Impressions.value"
      total: "sum.Impressions"
      share: "max_by.geo.Impressions.value / sum.Impressions * 100"

  - id: zero_engagement_alarm
    family: [display-like]
    severity: warning
    table_types: ["Performance by City", "Performance by Zip"]
    deduplicate: true
    when: "any_where(Clicks == 0 AND Impressions > 50, geo_dimension)"
    template: >
      {area_name} received {impressions:,.0f} impressions with
      zero clicks. This area is consuming delivery with no
      engagement signal — evaluate whether geo-targeting includes
      this area intentionally.
    bindings:
      area_name: "first_where(Clicks == 0 AND Impressions > 50, geo_dimension).name"
      impressions: "first_where(Clicks == 0 AND Impressions > 50, geo_dimension).Impressions"

  # ─── Creative analysis ──────────────────────────────────────

  - id: top_creative
    family: [display-like]
    severity: info
    table_types: ["Creative By Name"]
    when: "element_count(Creative) >= 3"
    template: >
      Top creative: "{best_name}" at {best_ctr:.2f}% CTR across
      {best_impressions:,.0f} impressions.
    bindings:
      best_name: "max_by.Creative.CTR.name"
      best_ctr: "max_by.Creative.CTR.value"
      best_impressions: "max_by.Creative.Impressions.value"

  # ─── Video-specific templates (YouTube, STV, Video) ─────────
  #
  # These fire when VCR (Video Completion Rate) exists.
  # YouTube and STV don't have CTR — they have VCR, VideoViews,
  # and completion quartiles. These templates replace CTR-based
  # analysis for video tactics.

  - id: video_overview
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -15
    deduplicate: true
    when: "sum.VCR > 0"
    template: >
      **{period_count} months** of video campaign data —
      **{total_impressions:,.0f}** impressions with
      **{avg_vcr:.1f}%** average completion rate{completions_note}.
    bindings:
      total_impressions: "sum.Impressions"
      avg_vcr: "campaign_avg.VCR"
      completions_note: >
        if(sum.Completions > 0,
          concat(' and **', format(sum.Completions, ',.0f'), '** full completions'),
          '')

  - id: vcr_trend
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.VCR > 0"
    template: >
      Video completion rate {direction} from **{prev_vcr:.1f}%** to
      **{current_vcr:.1f}%** ({change:+.1f} points).
    bindings:
      direction: "if(current.VCR >= prev.VCR, 'improved', 'declined')"
      prev_vcr: "prev.VCR"
      current_vcr: "current.VCR"
      change: "current.VCR - prev.VCR"

  - id: vcr_full_campaign_trend
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3 AND sum.VCR > 0"
    template: >
      Over the full **{period_count}-month** campaign, VCR moved from
      **{first_vcr:.1f}%** to **{last_vcr:.1f}%**{assessment}.
    bindings:
      first_vcr: "first.VCR"
      last_vcr: "current.VCR"
      assessment: >
        if(current.VCR > first.VCR + 5,
          ' — completion rates are improving, indicating stronger creative hold',
          if(current.VCR < first.VCR - 5,
            ' — completion rates are declining, consider creative refresh',
            ' — completion rates are holding steady'))

  - id: vcr_benchmark
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance", "Campaign Performance"]
    when: "sum.VCR > 0"
    template: >
      Campaign VCR of **{avg_vcr:.1f}%** is {assessment} the **50%** industry
      benchmark for video ads.
    bindings:
      avg_vcr: "campaign_avg.VCR"
      assessment: >
        if(campaign_avg.VCR > 70,
          'significantly above',
          if(campaign_avg.VCR > 50,
            'above',
            if(campaign_avg.VCR > 35,
              'near',
              'below')))

  - id: video_device_ranking
    family: [video-like]
    severity: info
    table_types: ["Device Performance"]
    when: "element_count(Device) >= 2 AND sum.VCR > 0"
    template: >
      **{best_device}** led with **{best_vcr:.1f}%** VCR.
      **{worst_device}** had the lowest at **{worst_vcr:.1f}%** VCR.
    bindings:
      best_device: "max_by.Device.VCR.name"
      best_vcr: "max_by.Device.VCR.value"
      worst_device: "min_by.Device.VCR.name"
      worst_vcr: "min_by.Device.VCR.value"

  - id: video_run_rate
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.VCR > 0"
    template: >
      Average monthly delivery: **{avg_impressions:,.0f}** video impressions
      with **{avg_vcr:.1f}%** completion rate per month.
    bindings:
      avg_impressions: "sum.Impressions / period_count"
      avg_vcr: "campaign_avg.VCR"

  - id: video_forecast
    family: [video-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 3 AND sum.VCR > 0"
    template: >
      At current run rate, the next **90 days** would deliver approximately
      **{proj_impressions:,.0f}** video impressions with an estimated
      **{proj_completions:,.0f}** full views.
    bindings:
      proj_impressions: "sum.Impressions / period_count * 3"
      proj_completions: >
        if(sum.Completions > 0,
          sum.Completions / period_count * 3,
          sum.Impressions / period_count * 3 * campaign_avg.VCR / 100)

  # ─── Social-specific templates (Meta) ───────────────────────

  - id: social_engagement_overview
    family: [social-like]
    severity: info
    table_types: ["Monthly Performance"]
    sort_order: -14
    deduplicate: true
    when: "sum.Engagements > 0"
    template: >
      **{total_engagements:,.0f}** post engagements across
      **{total_impressions:,.0f}** impressions
      (**{engagement_rate:.2f}%** engagement rate){leads_note}.
    bindings:
      total_engagements: "sum.Engagements"
      total_impressions: "sum.Impressions"
      engagement_rate: "sum.Engagements / sum.Impressions * 100"
      leads_note: >
        if(sum.Leads > 0,
          concat(', generating **', format(sum.Leads, ',.0f'), '** leads'),
          '')

  - id: social_engagement_trend
    family: [social-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "period_count >= 2 AND sum.Engagements > 0 AND abs((current.Engagements - prev.Engagements) / prev.Engagements) > 0.10"
    template: >
      Engagements {direction} **{abs_pct:.0f}%** month-over-month
      (**{prev_value:,.0f}** → **{current_value:,.0f}**).
    bindings:
      direction: "if(current.Engagements >= prev.Engagements, 'grew', 'declined')"
      abs_pct: "abs((current.Engagements - prev.Engagements) / prev.Engagements * 100)"
      prev_value: "prev.Engagements"
      current_value: "current.Engagements"

  - id: lead_performance
    family: [social-like, search-like]
    severity: info
    table_types: ["Monthly Performance"]
    when: "sum.Leads > 0 AND period_count >= 2"
    template: >
      **{total_leads:,.0f}** total leads across **{period_count}** months
      (**{avg_leads:.0f}** leads/month).
      {trend_note}
    bindings:
      total_leads: "sum.Leads"
      avg_leads: "sum.Leads / period_count"
      trend_note: >
        if(current.Leads > prev.Leads,
          concat('Lead volume **increased** from **', format(prev.Leads, ',.0f'),
            '** to **', format(current.Leads, ',.0f'), '** in the latest period.'),
          if(current.Leads < prev.Leads,
            concat('Lead volume **decreased** from **', format(prev.Leads, ',.0f'),
              '** to **', format(current.Leads, ',.0f'), '** in the latest period.'),
            'Lead volume held steady.'))

  # ─── Conversion tracking ────────────────────────────────────

  - id: conversion_alarm
    family: [display-like, video-like, search-like, social-like]
    severity: critical
    table_types: ["Campaign Performance", "Monthly Performance"]
    deduplicate: true
    when: "sum.Conversions == 0 AND sum.Impressions > 1000"
    template: >
      **Zero conversions** recorded across **{total_impressions:,.0f}** impressions
      over **{period_count}** reporting periods. Verify conversion pixel installation
      and attribution window configuration.
    bindings:
      total_impressions: "sum.Impressions"
