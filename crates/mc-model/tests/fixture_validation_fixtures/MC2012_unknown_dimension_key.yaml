# MC2012 — fixture column header names a dimension that isn't declared
# (typo'd 'Scenrio'). All real dims are still present in `columns:` so
# MC2019 does NOT also fire — this isolates MC2012 cleanly.
model_format_version: 1
metadata:
  name: "MC2012_neg"
  description: "x"
dimensions:
  - { name: "Scenario", description: "x", kind: "Scenario", elements: [{ name: "Base", scenario_meta: "Default" }] }
  - { name: "Version",  description: "x", kind: "Version",  elements: [{ name: "Working", version_state: "Draft" }] }
  - { name: "Measure",  description: "x", kind: "Measure",  elements: [] }
measures:
  - { name: "Spend", description: "x", role: "Input", data_type: "F64", aggregation: "Sum" }
rules: []
canonical_inputs:
  inline:
    rows:
      - ["typo_val", "Base", "Working", "Spend", 100.0]
  columns: ["Scenrio", "Scenario", "Version", "Measure", "value"]
