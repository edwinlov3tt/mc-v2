# Acme model with one impossible golden_test value. Used by
# `tests/demo_no_goldens.rs` to prove that `mc demo --model` does NOT
# run goldens — if it did, this fixture would fail the demo, but per
# ADR-0005 amendment #12 demo's job is "load + validate + run + print",
# not "check goldens".
#
# Identical to examples/acme.yaml except: the `spend_input_anchor_...`
# golden expects 999_999.0 instead of 11500.0 (impossible — the
# canonical input is 11500.0 at this coord).
model_format_version: 1

metadata:
  name: "Acme_MarketingFinance"
  description: "Acme variant with one bad golden — used to prove demo doesn't run goldens."
  author: "Phase 3B test"
  created: "2026-05-03"

dimensions:
  - name: "Scenario"
    description: "Plan branches the user can switch between (baseline vs alternates)."
    kind: "Scenario"
    elements:
      - { name: "Baseline", scenario_meta: "Default" }
      - { name: "Aggressive", scenario_meta: "NonDefault" }
      - { name: "Conservative", scenario_meta: "NonDefault" }

  - name: "Version"
    description: "Workflow state of a plan revision (draft → submitted → approved)."
    kind: "Version"
    elements:
      - { name: "Working", version_state: "Draft" }
      - { name: "Submitted", version_state: "Submitted" }
      - { name: "Approved", version_state: "Approved" }

  - name: "Time"
    description: "Calendar time periods used for plan-vs-actual rollups (months → quarters → year)."
    kind: "Standard"
    elements:
      - { name: "Jan_2026" }
      - { name: "Feb_2026" }
      - { name: "Mar_2026" }
      - { name: "Apr_2026" }
      - { name: "May_2026" }
      - { name: "Jun_2026" }
      - { name: "Jul_2026" }
      - { name: "Aug_2026" }
      - { name: "Sep_2026" }
      - { name: "Oct_2026" }
      - { name: "Nov_2026" }
      - { name: "Dec_2026" }
      - { name: "Q1_2026" }
      - { name: "Q2_2026" }
      - { name: "Q3_2026" }
      - { name: "Q4_2026" }
      - { name: "FY_2026" }

  - name: "Channel"
    description: "Marketing channels grouped into Paid_Media and Owned_Earned families."
    kind: "Standard"
    elements:
      - { name: "Paid_Search" }
      - { name: "Paid_Social" }
      - { name: "Display" }
      - { name: "Email" }
      - { name: "Organic" }
      - { name: "Paid_Media" }
      - { name: "Owned_Earned" }
      - { name: "All_Channels" }

  - name: "Market"
    description: "Geographic markets — cities rolling up through states and regions to USA."
    kind: "Standard"
    elements:
      - { name: "Tampa" }
      - { name: "Orlando" }
      - { name: "Miami" }
      - { name: "Atlanta" }
      - { name: "Charlotte" }
      - { name: "New_York_City" }
      - { name: "Boston" }
      - { name: "Florida" }
      - { name: "Georgia" }
      - { name: "North_Carolina" }
      - { name: "New_York_State" }
      - { name: "Massachusetts" }
      - { name: "Southeast" }
      - { name: "Northeast" }
      - { name: "USA" }

  - name: "Measure"
    description: "Inputs (Spend, ratios) and derived KPIs (Clicks, Leads, Customers, Revenue, Gross_Profit)."
    kind: "Measure"
    elements: []

hierarchies:
  - dimension: "Time"
    name: "Calendar"
    default: true
    edges:
      - { parent: "FY_2026", child: "Q1_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q2_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q3_2026", weight: 1.0 }
      - { parent: "FY_2026", child: "Q4_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Jan_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Feb_2026", weight: 1.0 }
      - { parent: "Q1_2026", child: "Mar_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Apr_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "May_2026", weight: 1.0 }
      - { parent: "Q2_2026", child: "Jun_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Jul_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Aug_2026", weight: 1.0 }
      - { parent: "Q3_2026", child: "Sep_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Oct_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Nov_2026", weight: 1.0 }
      - { parent: "Q4_2026", child: "Dec_2026", weight: 1.0 }

  - dimension: "Channel"
    name: "Grouping"
    default: true
    edges:
      - { parent: "All_Channels", child: "Paid_Media", weight: 1.0 }
      - { parent: "All_Channels", child: "Owned_Earned", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Search", weight: 1.0 }
      - { parent: "Paid_Media", child: "Paid_Social", weight: 1.0 }
      - { parent: "Paid_Media", child: "Display", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Email", weight: 1.0 }
      - { parent: "Owned_Earned", child: "Organic", weight: 1.0 }

  - dimension: "Market"
    name: "Geographic"
    default: true
    edges:
      - { parent: "USA", child: "Southeast", weight: 1.0 }
      - { parent: "USA", child: "Northeast", weight: 1.0 }
      - { parent: "Southeast", child: "Florida", weight: 1.0 }
      - { parent: "Southeast", child: "Georgia", weight: 1.0 }
      - { parent: "Southeast", child: "North_Carolina", weight: 1.0 }
      - { parent: "Northeast", child: "New_York_State", weight: 1.0 }
      - { parent: "Northeast", child: "Massachusetts", weight: 1.0 }
      - { parent: "Florida", child: "Tampa", weight: 1.0 }
      - { parent: "Florida", child: "Orlando", weight: 1.0 }
      - { parent: "Florida", child: "Miami", weight: 1.0 }
      - { parent: "Georgia", child: "Atlanta", weight: 1.0 }
      - { parent: "North_Carolina", child: "Charlotte", weight: 1.0 }
      - { parent: "New_York_State", child: "New_York_City", weight: 1.0 }
      - { parent: "Massachusetts", child: "Boston", weight: 1.0 }

measures:
  - { name: "Spend", description: "Marketing dollars allocated to a channel/market/period (USD).", role: "Input", data_type: "F64", aggregation: "Sum" }
  - { name: "CPC", description: "Cost per click (USD/click); rolls up as a Spend-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Spend" }
  - { name: "CVR", description: "Click-to-lead conversion rate (leads/click); rolls up as a Clicks-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Clicks" }
  - { name: "Close_Rate", description: "Lead-to-customer close rate (customers/lead); rolls up as a Leads-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Leads" }
  - { name: "AOV", description: "Average order value per customer (USD); rolls up as a Customers-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Customers" }
  - { name: "COGS_Rate", description: "Cost-of-goods-sold rate (fraction of revenue); rolls up as a Revenue-weighted average.", role: "Input", data_type: "F64", aggregation: "WeightedAverage", weight_measure: "Revenue" }
  - { name: "Clicks", description: "Derived click volume; computed as Spend / CPC at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Leads", description: "Derived lead volume; computed as Clicks * CVR at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Customers", description: "Derived customer count; computed as Leads * Close_Rate at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Revenue", description: "Derived top-line revenue (USD); computed as Customers * AOV at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }
  - { name: "Gross_Profit", description: "Derived gross profit (USD); Revenue * (1 - COGS_Rate) at the leaf level.", role: "Derived", data_type: "F64", aggregation: "Sum" }

rules:
  - name: "rule_clicks"
    description: "Clicks = Spend / CPC."
    target_measure: "Clicks"
    scope: "AllLeaves"
    body:
      div:
        - { ref: "Spend" }
        - { ref: "CPC" }
    declared_dependencies: ["Spend", "CPC"]

  - name: "rule_leads"
    description: "Leads = Clicks * CVR."
    target_measure: "Leads"
    scope: "AllLeaves"
    body:
      mul:
        - { ref: "Clicks" }
        - { ref: "CVR" }
    declared_dependencies: ["Clicks", "CVR"]

  - name: "rule_customers"
    description: "Customers = Leads * Close_Rate."
    target_measure: "Customers"
    scope: "AllLeaves"
    body:
      mul:
        - { ref: "Leads" }
        - { ref: "Close_Rate" }
    declared_dependencies: ["Leads", "Close_Rate"]

  - name: "rule_revenue"
    description: "Revenue = Customers * AOV."
    target_measure: "Revenue"
    scope: "AllLeaves"
    body:
      mul:
        - { ref: "Customers" }
        - { ref: "AOV" }
    declared_dependencies: ["Customers", "AOV"]

  - name: "rule_gross_profit"
    description: "Gross_Profit = Revenue * (1 - COGS_Rate)."
    target_measure: "Gross_Profit"
    scope: "AllLeaves"
    body:
      mul:
        - { ref: "Revenue" }
        - sub:
            - { const: 1.0 }
            - { ref: "COGS_Rate" }
    declared_dependencies: ["Revenue", "COGS_Rate"]

# The bad golden — expects 999999.0 where the canonical input writes
# 11500.0 at Mar_2026 / Paid_Search / Tampa. `mc model test` fails
# loudly on this; `mc demo --model` MUST exit 0 nonetheless because
# demo doesn't run goldens.
golden_tests:
  - name: "spend_anchor_INTENTIONALLY_WRONG"
    coord:
      Scenario: "Baseline"
      Version: "Working"
      Time: "Mar_2026"
      Channel: "Paid_Search"
      Market: "Tampa"
      Measure: "Spend"
    expect: 999999.0
