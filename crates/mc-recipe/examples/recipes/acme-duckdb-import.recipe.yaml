# Acme DuckDB import — query-based load with `quarantine` error handling.
#
# DuckDB drives the same query-shape as SQLite. This recipe exercises
# the `quarantine` `on_error:` mode (failing rows go to the per-import
# quarantine log, remaining rows proceed) and a non-default batch size.
#
# Validation (against examples/acme.yaml): ZERO MC5xxx errors.

version: 1
name: acme_duckdb_quarantine
description: "DuckDB import with quarantine on row failures."
model: ../../../mc-model/examples/acme.yaml

source:
  driver: duckdb
  path: ./acme.duckdb
  query: |
    SELECT period AS month, ch AS channel, mkt AS market,
           usd_spend AS spend, cost_per_click AS cpc
    FROM v_acme_baseline_working

columns:
  - { source: month, dimension: Time }
  - { source: channel, dimension: Channel }
  - { source: market, dimension: Market }
  - { source: spend, measure: Spend, type: f64 }
  - { source: cpc, measure: CPC, type: f64 }

defaults:
  Scenario: Baseline
  Version: Working

write_disposition: replace
incremental: false

batch:
  size: 100000

on_error: quarantine
on_missing_element: error

credentials: {}
