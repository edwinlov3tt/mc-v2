# DuckDB Federation: MySQL via mysql_scanner
#
# DuckDB supports federated queries against remote MySQL databases using
# the `mysql` extension (mysql_scanner). Usage:
#
#   INSTALL mysql; LOAD mysql;
#   ATTACH 'host=localhost user=root database=mydb' AS mysql_db (TYPE mysql);
#   SELECT * FROM mysql_db.marketing_data;
#
# This recipe demonstrates federated MySQL access through DuckDB's driver.
# No separate MySQL driver installation is required — DuckDB handles the
# connection internally via its extension system.
#
# Requirements:
# - DuckDB >= 0.8 (mysql_scanner extension)
# - Network access to the MySQL instance
# - No system-installed MySQL client libraries needed

version: 1
name: acme_duckdb_federated_mysql
description: "Federated query from DuckDB into MySQL via mysql_scanner extension."
model: ../../crates/mc-model/examples/acme.yaml

source:
  driver: duckdb
  path: ./federation-cache.duckdb
  query: |
    INSTALL mysql;
    LOAD mysql;
    ATTACH 'host=localhost user=analyst password=secret database=marketing' AS mysql_db (TYPE mysql);
    SELECT month, channel, market, spend, cpc
    FROM mysql_db.campaign_metrics;

columns:
  - { source: month, dimension: Time }
  - { source: channel, dimension: Channel }
  - { source: market, dimension: Market }
  - { source: spend, measure: Spend, type: f64 }
  - { source: cpc, measure: CPC, type: f64 }

defaults:
  Scenario: Baseline
  Version: Working

batch:
  size: 10000
on_error: abort
